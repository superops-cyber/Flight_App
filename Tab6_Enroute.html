  .slide-overlay {

  .map-popup {

    .enroute-row-kpis { width: 100%; }
    .api-row         { grid-template-columns: 1fr; }

    // Early resilience hook: keep PilotApp from seeing Tab 6 as "not loaded"

  function _enrouteFmtHhmm(dateObj) {
    if (!(dateObj instanceof Date) || isNaN(dateObj.getTime())) return '--:--Z';
    const hh = String(dateObj.getUTCHours()).padStart(2, '0');
    const mm = String(dateObj.getUTCMinutes()).padStart(2, '0');
    return `${hh}:${mm}Z`;
  }

  function _enrouteFmtBsbHhmm_(dateObj) {
    if (!(dateObj instanceof Date) || isNaN(dateObj.getTime())) return '--:-- BSB';
    const hhmm = new Intl.DateTimeFormat('en-GB', {
      timeZone: 'America/Sao_Paulo',
      hour12: false,
      hour: '2-digit',
      minute: '2-digit'
    }).format(dateObj);
    return `${hhmm} BSB`;
  }

  function _enrouteKtsFrom(value) {
    const n = Number(value || 0);
    if (!isFinite(n) || n <= 0) return 0;
    if (n > 130) return n; // likely already knots for aircraft
    return n * 1.94384; // assume m/s
  }

  function _enrouteSetStatus(text) {
    const el = document.getElementById('enroute-live-status');
    if (el) el.textContent = text;
  }

  function _enrouteDiag(message) {
    // Diagnostics disabled in current version
  }

  function _enroutePulseGs() {
    const badge = document.getElementById('enroute-gs-badge');
    if (!badge) return;
    badge.classList.remove('pulse');
    void badge.offsetWidth;
    badge.classList.add('pulse');
  }

  function _enrouteUpdateHeader() {
    const gs = Math.round(Number(window.enroute6.gsKts || 0));
    const badge = document.getElementById('enroute-gs-badge');
    if (badge) badge.textContent = `GS: ${gs || '--'} kts`;

    const pos = document.getElementById('enroute-position-line');
    if (pos) {
      const lat = window.enroute6.lat;
      const lon = window.enroute6.lon;
      const tail = window.currentBriefingMission && window.currentBriefingMission.acft ? window.currentBriefingMission.acft : 'N/A';
      pos.textContent = (lat != null && lon != null)
        ? `Position: ${lat.toFixed(5)}, ${lon.toFixed(5)} • ${tail}`
        : `Position: -- • ${tail}`;
    }
  }

  function _enrouteDefaultVrForAircraft_(acftObj) {
    return 0;
  }

  function _enrouteDefaultConfig_() {
    return {
      autoPassThresholdNm: 0.8,
      airborneConfirmKts: 40,
      landedThresholdKts: 30,
      onBlocksPromptSec: 45
    };
  }

  function _enrouteReadConfig_() {
    var defaults = _enrouteDefaultConfig_();
    var cfg = {};
    try {
      cfg = JSON.parse(localStorage.getItem('enrouteConfigV1') || '{}') || {};
    } catch (e) {
      cfg = {};
    }
    return {
      autoPassThresholdNm: Math.max(0.5, Number(cfg.autoPassThresholdNm || defaults.autoPassThresholdNm)),
      airborneConfirmKts: Math.max(15, Number(cfg.airborneConfirmKts || defaults.airborneConfirmKts)),
      landedThresholdKts: Math.max(10, Number(cfg.landedThresholdKts || defaults.landedThresholdKts)),
      onBlocksPromptSec: Math.max(10, Number(cfg.onBlocksPromptSec || defaults.onBlocksPromptSec))
    };
  }

  function _enrouteApplyConfig_(cfg, updateInputs) {
    var c = cfg || _enrouteReadConfig_();
    window.enroute6.autoPassThresholdNm = Number(c.autoPassThresholdNm || 0.8);
    window.enroute6.autoLog = window.enroute6.autoLog || {};
    window.enroute6.autoLog.airborneConfirmKts = Number(c.airborneConfirmKts || 40);
    window.enroute6.autoLog.landedThresholdKts = Number(c.landedThresholdKts || 30);
    window.enroute6.autoLog.onBlocksPromptMs = Math.round(Number(c.onBlocksPromptSec || 45) * 1000);

    if (updateInputs !== false) {
      var ap = document.getElementById('enroute-config-autopass'); if (ap) ap.value = String(window.enroute6.autoPassThresholdNm);
      var ac = document.getElementById('enroute-config-airborne-kts'); if (ac) ac.value = String(window.enroute6.autoLog.airborneConfirmKts);
      var lk = document.getElementById('enroute-config-landed-kts'); if (lk) lk.value = String(window.enroute6.autoLog.landedThresholdKts);
      var ob = document.getElementById('enroute-config-onblocks-sec'); if (ob) ob.value = String(Math.round(window.enroute6.autoLog.onBlocksPromptMs / 1000));
    }
  }

  window.saveEnrouteConfig = function() {
    var cfg = {
      autoPassThresholdNm: Math.max(0.5, Number((document.getElementById('enroute-config-autopass') || {}).value || 0.8)),
      airborneConfirmKts: Math.max(15, Number((document.getElementById('enroute-config-airborne-kts') || {}).value || 40)),
      landedThresholdKts: Math.max(10, Number((document.getElementById('enroute-config-landed-kts') || {}).value || 30)),
      onBlocksPromptSec: Math.max(10, Number((document.getElementById('enroute-config-onblocks-sec') || {}).value || 45))
    };
    localStorage.setItem('enrouteConfigV1', JSON.stringify(cfg));
    _enrouteApplyConfig_(cfg, true);
    if (window.M) M.toast({ html: 'Enroute config saved', classes: 'green', displayLength: 2500 });
  };

  window.resetEnrouteConfig = function() {
    var cfg = _enrouteDefaultConfig_();
    localStorage.setItem('enrouteConfigV1', JSON.stringify(cfg));
    _enrouteApplyConfig_(cfg, true);
    if (window.M) M.toast({ html: 'Enroute config reset to defaults', classes: 'blue', displayLength: 2500 });
  };

  function _enrouteResolveVrFromAircraft_(acftObj, flapSetting) {
    var flapRaw = Number(flapSetting || 0);
    var validFlaps = [0, 10, 20, 25];
    var flap = validFlaps.reduce(function(best, current) {
      return Math.abs(current - flapRaw) < Math.abs(best - flapRaw) ? current : best;
    }, 0);
    var defaultVr = _enrouteDefaultVrForAircraft_(acftObj);
    if (!acftObj || typeof acftObj !== 'object') return defaultVr;

    var keyMap = {};
    Object.keys(acftObj || {}).forEach(function(k) {
      keyMap[String(k || '').toUpperCase().replace(/[^A-Z0-9]/g, '')] = acftObj[k];
    });

    var exactNorm = 'VR' + flap;
    if (Object.prototype.hasOwnProperty.call(keyMap, exactNorm)) {
      var exactVal = Number(keyMap[exactNorm]);
      if (isFinite(exactVal) && exactVal > 0) return exactVal;
    }

    var keys = Object.keys(acftObj || {});
    var preferredKeys = [
      'Vr' + Math.round(flap),
      'VR' + Math.round(flap),
      'VR_FLAPS_' + flap,
      'VR_FLAP_' + flap,
      'VR_' + flap,
      'V_R_FLAPS_' + flap,
      'V_ROTATE_FLAPS_' + flap
    ];
    for (var i = 0; i < preferredKeys.length; i++) {
      var key = preferredKeys[i];
      if (!Object.prototype.hasOwnProperty.call(acftObj, key)) continue;
      var val = Number(acftObj[key]);
      if (isFinite(val) && val > 0) return val;
    }

    var preferredNorm = ['VRFLAPS' + flap, 'VRFLAP' + flap, 'VROTATEFLAPS' + flap];
    for (var p = 0; p < preferredNorm.length; p++) {
      var candidate = preferredNorm[p];
      if (!Object.prototype.hasOwnProperty.call(keyMap, candidate)) continue;
      var candidateVal = Number(keyMap[candidate]);
      if (isFinite(candidateVal) && candidateVal > 0) return candidateVal;
    }

    var flapDigits = String(flap);
    for (var j = 0; j < keys.length; j++) {
      var rawKey = String(keys[j] || '');
      var normalized = rawKey.toUpperCase().replace(/[^A-Z0-9]/g, '');
      if (normalized.indexOf('VR') < 0) continue;
      if (flapDigits && normalized.indexOf(flapDigits) < 0 && normalized.indexOf('KTS') < 0) continue;
      var v = Number(acftObj[rawKey]);
      if (isFinite(v) && v > 0) return v;
    }

    // Last-resort generic Vr value (not flap-specific).
    var genericVrKeys = ['VR_KTS', 'VRKTS'];
    for (var g = 0; g < genericVrKeys.length; g++) {
      var genericKey = genericVrKeys[g];
      if (Object.prototype.hasOwnProperty.call(acftObj, genericKey)) {
        var genericVal = Number(acftObj[genericKey]);
        if (isFinite(genericVal) && genericVal > 0) return genericVal;
      }
      if (Object.prototype.hasOwnProperty.call(keyMap, genericKey)) {
        var genericNormVal = Number(keyMap[genericKey]);
        if (isFinite(genericNormVal) && genericNormVal > 0) return genericNormVal;
      }
    }
    return defaultVr;
  }

  function _enrouteGetSelectedFlapSetting_() {
    var flapEl = document.getElementById('perf-flaps') || document.getElementById('perf-flap-setting');
    var rawFlap = String(flapEl && flapEl.value || '').trim();
    var flapValue = Number(rawFlap.replace(/[^0-9.-]/g, ''));
    return (isFinite(flapValue) && flapValue > 0) ? flapValue : 10;
  }

  function _enrouteFindMissionAircraft_() {
    var acft = String((window.currentBriefingMission && window.currentBriefingMission.acft) || '').trim().toUpperCase();
    if (!acft) return null;
    var liveList = (window.appData && Array.isArray(window.appData.aircraft)) ? window.appData.aircraft : [];
    var cachedList = [];
    try {
      var raw = localStorage.getItem('mba_cache_dropdown_data_v1');
      if (raw) {
        var parsed = JSON.parse(raw);
        var payload = parsed && parsed.value ? parsed.value : parsed;
        cachedList = (payload && Array.isArray(payload.aircraft)) ? payload.aircraft : [];
      }
    } catch (e) {}
    var list = liveList.length ? liveList : cachedList;
    if (!Array.isArray(list) || !list.length) return null;
    return list.find(function(a) {
      return String(a && a.reg || '').trim().toUpperCase() === acft;
    }) || null;
  }

  function _enrouteUtcHhmm_(isoStr) {
    var d = new Date(isoStr);
    if (!d || isNaN(d.getTime())) return '----Z';
    return String(d.getUTCHours()).padStart(2, '0') + String(d.getUTCMinutes()).padStart(2, '0') + 'Z';
  }

  function _enrouteUpdateRollUi_() {
    var r = (window.enroute6 && window.enroute6.takeoffRoll) ? window.enroute6.takeoffRoll : null;
    var distEl = document.getElementById('enroute-roll-distance');
    var vrGoalEl = document.getElementById('enroute-roll-vr-goal');
    var gsEl = document.getElementById('enroute-roll-gsactual');
    var toTimeEl = document.getElementById('enroute-roll-totime');
    var btn = document.getElementById('enroute-roll-start-btn');

    // VR goal: visible before roll starts
    var acftObj = _enrouteFindMissionAircraft_();
    var rollHasStarted = !!(r && (r.active || r.startTs || r.vrHit));
    var flapNow = rollHasStarted ? Number(r.flapSetting || 0) : _enrouteGetSelectedFlapSetting_();
    var vrGoal = _enrouteResolveVrFromAircraft_(acftObj, flapNow);
    if (vrGoalEl) {
      vrGoalEl.textContent = (isFinite(vrGoal) && vrGoal > 0) ? (Math.round(vrGoal) + ' kts') : '-- kts';
      vrGoalEl.title = 'Flap=' + Math.round(Number(flapNow || 0)) + ' | Aircraft=' + String((acftObj && acftObj.reg) || 'N/A');
    }
    try {
      var vrDiagKey = [String((acftObj && acftObj.reg) || ''), Math.round(Number(flapNow || 0)), Math.round(Number(vrGoal || 0))].join('|');
      if (window.enroute6 && window.enroute6._lastVrDiagKey !== vrDiagKey) {
        window.enroute6._lastVrDiagKey = vrDiagKey;
        _enrouteDiag('Vr lookup: flap=' + Math.round(Number(flapNow || 0)) + ', acft=' + String((acftObj && acftObj.reg) || 'N/A') + ', vr=' + (vrGoal > 0 ? Math.round(vrGoal) + 'kts' : 'missing'));
      }
    } catch (e) {}

    if (!r) return;

    if (gsEl) {
      var gsNow = Number(window.enroute6 && window.enroute6.gsKts || 0);
      gsEl.textContent = Number(gsNow || 0).toFixed(1) + ' kts';
    }

    // Distance display: freeze once Vr hit
    if (distEl) {
      if (r.vrHit && r.distanceAtVrNm != null) {
        distEl.textContent = Math.round(Number(r.distanceAtVrNm || 0) * 1852) + 'm';
      } else {
        var meters = Number(r.distanceNm || 0) * 1852;
        distEl.textContent = isFinite(meters) ? (Math.round(meters) + 'm') : '--m';
      }
    }

    // VR Time display: only show actual Vr-hit time.
    if (toTimeEl) {
      if (r.vrHitAtTs) {
        toTimeEl.textContent = _enrouteUtcHhmm_(r.vrHitAtTs);
      } else {
        toTimeEl.textContent = '--:--Z';
      }
    }

    if (btn) {
      if (r.active && !r.vrHit) btn.textContent = 'MEASURING\nTAP TO STOP';
      else if (r.vrHit) btn.textContent = 'VR REACHED\nRESTART';
      else btn.textContent = 'START ROLL';
    }
  }

  function _enroutePersistTakeoffRoll_(rollSnapshot) {
    var flightId = String(window.enroute6 && window.enroute6.flightLegId || '').trim();
    if (!flightId || !rollSnapshot) return;

    var sendViaGs = function() {
      if (!window.google || !google.script || !google.script.run) return;
      google.script.run
        .withSuccessHandler(function() {})
        .withFailureHandler(function(err) {
          console.warn('saveTakeoffRollToLog failed', err);
        })
        .saveTakeoffRollToLog(flightId, rollSnapshot);
    };

    if (typeof window.runOrQueueServerAction === 'function') {
      window.runOrQueueServerAction({
        method: 'saveTakeoffRollToLog',
        args: [flightId, rollSnapshot],
        label: 'Takeoff roll'
      }, {
        onSuccess: function() {},
        onQueued: function() {},
        onFailure: function(err) {
          console.warn('Queued saveTakeoffRollToLog failed', err);
          sendViaGs();
        }
      });
      return;
    }
    sendViaGs();
  }

  window.startTakeoffRollMeasurement = function() {
    var current = window.enroute6 && window.enroute6.takeoffRoll;
    if (current && current.active) {
      current.active = false;
      _enrouteUpdateRollUi_();
      if (window.M) M.toast({ html: 'Roll measurement stopped', classes: 'orange' });
      return;
    }

    var lat = Number(window.enroute6.lat);
    var lon = Number(window.enroute6.lon);
    if (!isFinite(lat) || !isFinite(lon)) {
      if (window.M) M.toast({ html: 'Need GPS lock before starting roll tool', classes: 'orange' });
      return;
    }
    var flapSetting = _enrouteGetSelectedFlapSetting_();
    var acftObj = _enrouteFindMissionAircraft_();
    var vr = _enrouteResolveVrFromAircraft_(acftObj, flapSetting);

    // Arm auto-log automatically when roll measurement starts so landing time is captured reliably.
    var al = window.enroute6 && window.enroute6.autoLog;
    if (al && !al.enabled) {
      al.enabled = true;
      al.state = 'GROUND';
      al.prevGsKts = Number(window.enroute6 && window.enroute6.gsKts || 0);
      al.aboveTs = 0;
      al.belowTs = 0;
      al.brakesReleaseFired = false;
      al.airborneConfirmed = false;
      al.promptShown = false;
      al.landedFired = false;
      al.touchAndGoCount = 0;
      _autoLogUpdateChip();
      var autoBtn = document.getElementById('autolog-toggle-btn');
      if (autoBtn) autoBtn.textContent = 'DISABLE';
      if (window.M) M.toast({ html: 'Auto-log armed with Start Roll', classes: 'blue darken-2', displayLength: 3500 });
    }

    window.enroute6.takeoffRoll = {
      active: true,
      startLat: lat,
      startLon: lon,
      prevLat: lat,
      prevLon: lon,
      distanceNm: 0,
      startTs: new Date().toISOString(),
      maxGsKts: Number(window.enroute6.gsKts || 0),
      flapSetting: flapSetting,
      vrKts: Number(vr || 0),
      vrHit: false,
      vrHitAtTs: null,
      gsAtVrKts: 0,
      distanceAtVrNm: 0,
      saveSent: false
    };
    _enrouteUpdateRollUi_();
    if (window.M) M.toast({ html: 'Takeoff roll measurement started', classes: 'blue darken-2' });
  };

  function _enrouteUpdateTakeoffRoll_() {
    var e = window.enroute6;
    var r = e && e.takeoffRoll;
    if (!r) return;
    var lat = Number(e.lat);
    var lon = Number(e.lon);
    var gs = Number(e.gsKts || 0);
    if (!isFinite(lat) || !isFinite(lon)) {
      _enrouteUpdateRollUi_();
      return;
    }

    if (r.active && isFinite(r.prevLat) && isFinite(r.prevLon)) {
      var segNm = _enrouteDistNm(r.prevLat, r.prevLon, lat, lon);
      if (isFinite(segNm) && segNm >= 0 && segNm < 0.2) {
        r.distanceNm += segNm;
      }
      r.prevLat = lat;
      r.prevLon = lon;
      r.maxGsKts = Math.max(Number(r.maxGsKts || 0), gs);

      var vrTarget = Number(r.vrKts || 0);
      if (!r.vrHit && vrTarget > 0 && gs >= vrTarget) {
        r.vrHit = true;
        r.active = false;
        r.vrHitAtTs = new Date().toISOString();
        r.gsAtVrKts = Number(gs.toFixed(1));
        r.distanceAtVrNm = Number(r.distanceNm || 0);
        if (!r.saveSent) {
          r.saveSent = true;
          _enroutePersistTakeoffRoll_({
            capturedAt: r.vrHitAtTs,
            startTs: r.startTs,
            flapSetting: Number(r.flapSetting || 0),
            vrKts: Number(vrTarget.toFixed(1)),
            gsAtVrKts: Number(r.gsAtVrKts || 0),
            distanceAtVrNm: Number((r.distanceAtVrNm || 0).toFixed(4)),
            distanceAtVrM: Math.round(Number(r.distanceAtVrNm || 0) * 1852),
            maxGsKts: Number((r.maxGsKts || 0).toFixed(1))
          });
          // Write airborne timestamp to leg cache so Tab 8 can prefill it
          (function() {
            try {
              var fid = String(window.enroute6 && window.enroute6.flightLegId || '');
              var mid = String(window.enroute6 && window.enroute6.missionId || '');
              if (!fid || !mid) return;
              ['mission_' + mid, 'mba_cache_mission_' + mid].forEach(function(ck) {
                var c = null;
                try { c = JSON.parse(localStorage.getItem(ck)); } catch (_) {}
                if (!c || !Array.isArray(c.legs)) return;
                var leg = c.legs.find(function(l) { return String(l && l.flightLegId || '') === fid; });
                if (!leg) return;
                if (leg.airborne) return; // already set by auto-log
                leg.airborne = r.vrHitAtTs;
                leg.airborneTime = r.vrHitAtTs;
                localStorage.setItem(ck, JSON.stringify(c));
              });
              if (window.currentBriefingMission && String(window.currentBriefingMission.id || '') === mid) {
                var ml = (window.currentBriefingMission.legs || []).find(function(l) { return String(l && l.flightLegId || '') === fid; });
                if (ml && !ml.airborne) { ml.airborne = r.vrHitAtTs; ml.airborneTime = r.vrHitAtTs; }
              }
            } catch (_) {}
          })();
        }
        if (window.M) {
          M.toast({
            html: 'Vr reached at ' + Math.round(Number(r.distanceAtVrNm || 0) * 1852) + ' m • GS ' + Number(r.gsAtVrKts || 0).toFixed(1) + ' kts',
            classes: 'green',
            displayLength: 7000
          });
        }
      }
    }
    _enrouteUpdateRollUi_();
  }

  // ----------- Phase 2 geometry helpers -----------

  // Haversine distance between two lat/lon points in nautical miles
  function _enrouteDistNm(lat1, lon1, lat2, lon2) {
    const R = 3440.065;
    const toRad = d => d * Math.PI / 180;
    const dLat = toRad(lat2 - lat1);
    const dLon = toRad(lon2 - lon1);
    const a = Math.sin(dLat / 2) ** 2
      + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon / 2) ** 2;
    return 2 * R * Math.asin(Math.sqrt(Math.min(1, a)));
  }

  // Cross-track (perpendicular) distance from point P to great-circle A→B, in nm
  function _enrouteCrossTrackNm(pLat, pLon, aLat, aLon, bLat, bLon) {
    const R = 3440.065;
    const toRad = d => d * Math.PI / 180;
    const d13 = _enrouteDistNm(aLat, aLon, pLat, pLon) / R;
    const brg13 = toRad(_calculateBearing(aLat, aLon, pLat, pLon));
    const brg12 = toRad(_calculateBearing(aLat, aLon, bLat, bLon));
    return Math.abs(Math.asin(Math.max(-1, Math.min(1, Math.sin(d13) * Math.sin(brg13 - brg12)))) * R);
  }

  // Along-track distance from A to the closest point on A→B to P, in nm (positive = ahead)
  function _enrouteAlongTrackNm(pLat, pLon, aLat, aLon, bLat, bLon) {
    const R = 3440.065;
    const toRad = d => d * Math.PI / 180;
    const d13 = _enrouteDistNm(aLat, aLon, pLat, pLon) / R;
    const xtk = _enrouteCrossTrackNm(pLat, pLon, aLat, aLon, bLat, bLon) / R;
    return Math.acos(Math.max(-1, Math.min(1, Math.cos(d13) / Math.cos(xtk)))) * R;
  }

  // ----------- Phase 2 logic -----------

  function _enrouteAutoProgress() {
    const e = window.enroute6;
    const wps = e.waypoints;
    if (!wps || !wps.length || e.lat == null || e.lon == null) return;
    const nextIdx = e.passedIndex + 1;
    if (nextIdx >= wps.length) return;

    const nextWp = wps[nextIdx];
    const coord = _lookupFix(nextWp.fix);
    if (!coord) return;

    const dist = _enrouteDistNm(e.lat, e.lon, coord.lat, coord.lon);
    const gs = Math.max(0, Number(e.gsKts || 0));
    const speedAdjustedArmNm = Math.max(0.55, Math.min(1.0, Number(e.autoPassThresholdNm || 0.8) + (gs / 250)));
    const nowTs = Date.now();

    e.autoPassTrack = e.autoPassTrack || {
      idx: -1,
      armed: false,
      armRadiusNm: speedAdjustedArmNm,
      bestDistNm: 999,
      lastDistNm: 999,
      armedAtTs: 0
    };

    if (Number(e.autoPassTrack.idx) !== Number(nextIdx)) {
      e.autoPassTrack = {
        idx: nextIdx,
        armed: false,
        armRadiusNm: speedAdjustedArmNm,
        bestDistNm: dist,
        lastDistNm: dist,
        armedAtTs: 0
      };
      return;
    }

    e.autoPassTrack.armRadiusNm = speedAdjustedArmNm;
    e.autoPassTrack.bestDistNm = Math.min(Number(e.autoPassTrack.bestDistNm || 999), dist);

    if (!e.autoPassTrack.armed && dist <= speedAdjustedArmNm) {
      e.autoPassTrack.armed = true;
      e.autoPassTrack.armedAtTs = nowTs;
    }

    if (e.autoPassTrack.armed) {
      const movedAway = dist > (Number(e.autoPassTrack.lastDistNm || dist) + 0.12);
      const behindClosest = dist > (Number(e.autoPassTrack.bestDistNm || dist) + 0.25);
      const stableTrack = (nowTs - Number(e.autoPassTrack.armedAtTs || nowTs)) >= 4000;
      // Also auto-pass if armed for >120 seconds (handles destination and slow fly-bys)
      const timedOut = (nowTs - Number(e.autoPassTrack.armedAtTs || nowTs)) >= 120000;
      if (stableTrack && (movedAway && behindClosest || timedOut)) {
        markWaypointPassed(nextIdx, { auto: true, distanceNm: dist });
        _enrouteDiag(`AUTO-PASS ${nextWp.fix} arm=${speedAdjustedArmNm.toFixed(2)} best=${Number(e.autoPassTrack.bestDistNm || dist).toFixed(2)} now=${dist.toFixed(2)}nm`);
        if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
        e.autoPassTrack = { idx: -1, armed: false, armRadiusNm: 0.8, bestDistNm: 999, lastDistNm: 999, armedAtTs: 0 };
        return;
      }
    }

    e.autoPassTrack.lastDistNm = dist;
  }

  function _enrouteUpdateOffCourseBanner(xtkNm) {
    const strip = document.getElementById('enroute-xtk-strip');
    if (!strip) return;
    const e = window.enroute6;
    const wps = e.waypoints;
    const nextIdx = e.passedIndex + 1;
    const nextFix = (wps && wps[nextIdx]) ? wps[nextIdx].fix : '--';
    const distToNext = (wps && wps[nextIdx]) ? _enrouteDistNm(
      e.lat, e.lon,
      ...(() => { const c = _lookupFix(nextFix); return c ? [c.lat, c.lon] : [e.lat, e.lon]; })()
    ) : null;
    const distStr = distToNext != null ? distToNext.toFixed(1) + ' nm' : '-- nm';
    strip.textContent = `📍 XTK: ${xtkNm.toFixed(1)} nm  |  Next (${nextFix}): ${distStr}`;

    const threshold = Number(e.offCourseThresholdNm || 3);
    strip.classList.remove('xtk-warn', 'xtk-danger');
    if (xtkNm >= threshold) {
      strip.classList.add('xtk-danger');
    } else if (xtkNm >= threshold * 0.6) {
      strip.classList.add('xtk-warn');
    }
  }

  function _enrouteCheckOffCourse() {
    const e = window.enroute6;
    const wps = e.waypoints;
    if (!wps || e.lat == null || e.lon == null) return;

    const fromIdx = Math.max(0, e.passedIndex);
    const toIdx = e.passedIndex + 1;
    if (toIdx >= wps.length) return;

    const fromCoord = _lookupFix(wps[fromIdx].fix);
    const toCoord   = _lookupFix(wps[toIdx].fix);
    if (!fromCoord || !toCoord) return;

    const xtk = _enrouteCrossTrackNm(
      e.lat, e.lon,
      fromCoord.lat, fromCoord.lon,
      toCoord.lat, toCoord.lon
    );
    e.lastCrossTrackNm = xtk;
    _enrouteUpdateOffCourseBanner(xtk);

    _enrouteRefreshOffCourseLayer(xtk, toCoord);

    const threshold = Number(e.offCourseThresholdNm || 3);
    if (xtk >= threshold) {
      if (!e.offCourseAlertActive) {
        e.offCourseAlertActive = true;
        if (navigator.vibrate) navigator.vibrate([400, 200, 400, 200, 400]);
        if (window.M) M.toast({
          html: `⚠️ OFF COURSE: ${xtk.toFixed(1)} nm deviation`,
          classes: 'red darken-1',
          displayLength: 9000
        });
        _enrouteDiag(`OFF COURSE ${xtk.toFixed(1)}nm threshold=${threshold}nm`);
      }
    } else {
      e.offCourseAlertActive = false;
    }
  }

  function _enrouteRefreshOffCourseLayer(xtkNm, toCoord) {
    if (!window.enroute6.mapObj || !window.L) return;
    const e = window.enroute6;
    if (e.lat == null || e.lon == null) return;
    const threshold = Number(e.offCourseThresholdNm || 3);
    if (xtkNm < threshold * 0.6) {
      if (e.offCourseLayer && e.mapObj.hasLayer(e.offCourseLayer)) e.mapObj.removeLayer(e.offCourseLayer);
      return;
    }
    const color = xtkNm >= threshold ? '#ef5350' : '#ffc107';
    const latLngs = [[e.lat, e.lon], [toCoord.lat, toCoord.lon]];
    if (!e.offCourseLayer) {
      e.offCourseLayer = window.L.polyline(
        latLngs,
        { color: color, weight: 2, opacity: 0.75, dashArray: '6 6' }
      );
    } else {
      e.offCourseLayer.setLatLngs(latLngs);
      e.offCourseLayer.setStyle({ color: color });
    }
    if (!e.mapObj.hasLayer(e.offCourseLayer)) e.offCourseLayer.addTo(e.mapObj);
    e.offCourseLayer.bindTooltip(`XTK ${xtkNm.toFixed(1)} nm`, { direction: 'center', permanent: false });
  }

  // ----------- Position update (hooks Phase 2 in) -----------

  function _enrouteSetPosition(lat, lon, speedAny, sourceLabel) {
    if (!_enrouteValidLatLon_(lat, lon)) {
      _enrouteDiag('Ignored invalid position sample lat=' + String(lat) + ' lon=' + String(lon));
      return;
    }

    const prevLat = Number(window.enroute6.lat);
    const prevLon = Number(window.enroute6.lon);
    const prevTs = Number(window.enroute6.lastUpdateTs || 0);
    const nowTs = Date.now();

    const rawGsKts = Number(_enrouteKtsFrom(speedAny).toFixed(1));
    let derivedGsKts = 0;
    if (isFinite(prevLat) && isFinite(prevLon) && prevTs > 0 && nowTs > prevTs) {
      const dtSec = (nowTs - prevTs) / 1000;
      if (dtSec >= 1 && dtSec <= 30) {
        const segNm = _enrouteDistNm(prevLat, prevLon, Number(lat), Number(lon));
        if (isFinite(segNm) && segNm >= 0) {
          derivedGsKts = Number(((segNm / dtSec) * 3600).toFixed(1));
        }
      }
    }

    window.enroute6.lat = Number(lat);
    window.enroute6.lon = Number(lon);
    window.enroute6.gsKts = (rawGsKts > 1) ? rawGsKts : derivedGsKts;
    window.enroute6.lastUpdateTs = nowTs;
    // Compute and smooth track bearing from successive positions
    if (isFinite(prevLat) && isFinite(prevLon) && window.enroute6.gsKts > 3) {
      const toRad = d => d * Math.PI / 180;
      const dLon = toRad(Number(lon) - prevLon);
      const y = Math.sin(dLon) * Math.cos(toRad(Number(lat)));
      const x = Math.cos(toRad(prevLat)) * Math.sin(toRad(Number(lat)))
               - Math.sin(toRad(prevLat)) * Math.cos(toRad(Number(lat))) * Math.cos(dLon);
      const newBearing = ((Math.atan2(y, x) * 180 / Math.PI) + 360) % 360;
      // Smooth with exponential filter (80% new, 20% old) to reduce GPS jitter
      const prev = Number(window.enroute6.bearing || 0);
      window.enroute6.bearing = Math.round((newBearing * 0.8 + prev * 0.2) * 10) / 10;
    }
    _enrouteUpdateHeader();
    _enrouteRefreshAircraftMarker();
    _enroutePushBreadcrumb(Number(lat), Number(lon));
    _enroutePulseGs();
    _enrouteUpdateTakeoffRoll_();
    _autoLogTick(window.enroute6.gsKts);
    _enrouteAutoProgress();
    _enrouteRefreshDirectLayer();
    _enrouteMaybeRefreshDbLayers();
    _debounceRouteRedraw();
    _enrouteSetStatus(`Live: ${sourceLabel} • updated ${_enrouteFmtBsbHhmm_(new Date())}`);
    _enrouteDiag(`OK ${sourceLabel} lat=${Number(lat).toFixed(5)} lon=${Number(lon).toFixed(5)} gs=${Math.round(window.enroute6.gsKts)}kt`);
    _enrouteMaybePushLivePosition_();
  }

  // Throttled live position push to backend (max once per 15 s, only when online)
  function _enrouteMaybePushLivePosition_() {
    var e = window.enroute6;
    var now = Date.now();
    if (now - Number(e._lastLivePush || 0) < 15000) return;
    e._lastLivePush = now;
    if (!navigator.onLine || !window.google || !google.script || !google.script.run) return;
    if (!isFinite(Number(e.lat)) || !isFinite(Number(e.lon))) return;
    var reg = String(
      (window.currentBriefingMission && window.currentBriefingMission.acft) || ''
    ).trim().toUpperCase();
    if (!reg) return;
    google.script.run
      .withSuccessHandler(function() {})
      .withFailureHandler(function() {})
      .pushLivePosition({
        reg:       reg,
        missionId: String(e.missionId || e.flightLegId || ''),
        lat:       Number(e.lat),
        lng:       Number(e.lon),
        bearing:   Number(e.bearing || 0),
        gsKts:     Number(e.gsKts   || 0)
      });

  function _enrouteMaybeRefreshDbLayers(force) {
    var e = window.enroute6;
    var now = Date.now();
    if (!force && (now - Number(e.dbLastRefreshTs || 0)) < Number(e.dbRefreshIntervalMs || 12000)) return;
    e.dbLastRefreshTs = now;
    _enrouteRefreshDbLayers();
  }

  function _debounceRouteRedraw() {
    if (window.enroute6.routeRedrawTimer) clearTimeout(window.enroute6.routeRedrawTimer);
    window.enroute6.routeRedrawTimer = setTimeout(function() {
      recalcWaypointsFromGs();
      window.enroute6.routeRedrawTimer = null;
    }, 1200);
  }

  function _parseTraccarPayload(payload) {
    if (!payload) return null;

    const one = Array.isArray(payload)
      ? (payload[0] || null)
      : (payload.position || payload.data || payload);

    if (!one || typeof one !== 'object') return null;

    const lat = one.latitude ?? one.lat ?? one.coords?.latitude;
    const lon = one.longitude ?? one.lng ?? one.lon ?? one.coords?.longitude;
    const speed = one.speed ?? one.attributes?.speed ?? one.coords?.speed;

    if (lat == null || lon == null) return null;
    return { lat: Number(lat), lon: Number(lon), speed: Number(speed || 0) };
  }

  async function _pollTraccarEndpoint(endpointUrl) {
    const resp = await fetch(endpointUrl, { method: 'GET', cache: 'no-store' });
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const contentType = String(resp.headers.get('content-type') || '').toLowerCase();
    if (contentType.indexOf('application/json') < 0 && contentType.indexOf('text/json') < 0) {
      throw new Error('Non-JSON response');
    }
    const json = await resp.json();
    const parsed = _parseTraccarPayload(json);
    if (!parsed) throw new Error('No lat/lon in payload');
    _enrouteSetPosition(parsed.lat, parsed.lon, parsed.speed, 'Traccar API');
  }

  function _startGeoFallback() {
    if (!navigator.geolocation) {
      _enrouteSetStatus('No geolocation available on this device/browser.');
      return;
    }

    if (window.enroute6.gpsWatchId != null) return;

    window.enroute6.gpsWatchId = navigator.geolocation.watchPosition(function(pos) {
      const coords = pos.coords || {};
      _enrouteSetPosition(coords.latitude, coords.longitude, coords.speed || 0, 'iPad GPS fallback');
    }, function(err) {
      _enrouteSetStatus(`GPS fallback error: ${err && err.message ? err.message : err}`);
    }, {
      enableHighAccuracy: true,
      maximumAge: 2000,
      timeout: 10000
    });
  }

          al.state = 'AIRBORNE'; al.airborneConfirmed = true; al.brakesReleaseFired = true; al.airborneTs = now;

        _autoLogWriteLdgLogEntry_(mid, fid, 'LDG');

        if (fid && typeof window.runOrQueueServerAction === 'function') {
          window.runOrQueueServerAction(
            { method: 'recordLanded', args: [{ flightLegId: fid, landed: ts }], label: 'Landed' },
            {
              onSuccess: function() { _enrouteDiag('AUTO-LOG: recordLanded synced'); },
              onQueued:  function() { _enrouteDiag('AUTO-LOG: recordLanded queued offline'); },
              onFailure: function(e) { _enrouteDiag('AUTO-LOG: recordLanded error: ' + e); }
            }
          );
        }
      }

      function _autoLogLandingIcao_() {
        var wps = window.enroute6.waypoints || [];
        if (!wps.length) return '';
        // Use last passed waypoint as landing location, fall back to final destination
        var passed = Number(window.enroute6.passedIndex || 0);
        var idx = Math.max(0, Math.min(passed, wps.length - 1));
        return String(wps[idx] && wps[idx].fix || '');
      }

      function _autoLogWriteLdgLogEntry_(mid, fid, type) {
        try {
          if (!mid || !fid) return;
          var key = 'mba_autolog_ldglog_' + mid + '_' + fid;
          var list = [];
          try { list = JSON.parse(localStorage.getItem(key) || '[]'); } catch(e) {}
          if (!Array.isArray(list)) list = [];
          var icao = _autoLogLandingIcao_();
          // Format time as HH:MM UTC
          var now = new Date();
          var hh = String(now.getUTCHours()).padStart(2, '0');
          var mm = String(now.getUTCMinutes()).padStart(2, '0');
          var timeZ = hh + ':' + mm;
          list.push({ type: type, icao: icao, timeZ: timeZ });
          localStorage.setItem(key, JSON.stringify(list));
        } catch(e) { console.warn('autoLog ldglog write failed', e); }
      }

      function _autoLogFireTouchAndGo(count) {
        var fid = String(window.enroute6 && window.enroute6.flightLegId || '');
        var mid = String(window.enroute6 && window.enroute6.missionId || '');
        _enrouteDiag('AUTO-LOG: touch-and-go #' + count);
        if (window.M) M.toast({ html: '↩ Touch-and-go #' + count + ' detected', classes: 'orange darken-2', displayLength: 5000 });

        // Write to Tab 8 landing log
        _autoLogWriteLdgLogEntry_(mid, fid, 'TNG');

        // Write to localStorage leg cache so Tab8 pre-fills correctly offline
        (function() {
          try {
            if (!mid) return;
            var key = 'mission_' + mid;
            var cached = null;
            try { cached = JSON.parse(localStorage.getItem(key)); } catch(e) {}
            if (!cached || !Array.isArray(cached.legs)) return;
            var leg = cached.legs.find(function(l) { return String(l.flightLegId || '') === fid; });
            if (!leg) return;
            leg.numTouchAndGos = count;
            leg.numLdgs = count + 1;  // T&Gs + expected final
            localStorage.setItem(key, JSON.stringify(cached));
            if (window.currentBriefingMission && String(window.currentBriefingMission.id || '') === mid) {
              var ml = (window.currentBriefingMission.legs || []).find(function(l) { return String(l.flightLegId || '') === fid; });
              if (ml) { ml.numTouchAndGos = count; ml.numLdgs = count + 1; }
            }
          } catch(e) { console.warn('autoLog T&G cache update failed', e); }
        })();

        if (fid && typeof window.runOrQueueServerAction === 'function') {
          window.runOrQueueServerAction(
            { method: 'recordTouchAndGo', args: [{ flightLegId: fid, touchAndGoCount: count }], label: 'Touch-and-go #' + count },
            {
              onSuccess: function() { _enrouteDiag('AUTO-LOG: recordTouchAndGo synced (#' + count + ')'); },
              onQueued:  function() { _enrouteDiag('AUTO-LOG: recordTouchAndGo queued offline (#' + count + ')'); },
              onFailure: function(e) { _enrouteDiag('AUTO-LOG: recordTouchAndGo error: ' + e); }

      window._autoLogConfirmOnBlocks = function(confirmed) {
        if (confirmed) {
          if (typeof window.tab7OnBlocksThenAdvance === 'function') {
            window.tab7OnBlocksThenAdvance();
          } else {
            var legId = String(window.enroute6.flightLegId || '');
            var missionId = String(window.enroute6.missionId || '');
            (function() {
              try {
                var key = 'mission_' + missionId;
                var cached = null;
                try { cached = JSON.parse(localStorage.getItem(key)); } catch(e) {}
                if (!cached || !Array.isArray(cached.legs)) return;
                var leg = cached.legs.find(function(l) { return String(l.flightLegId || '') === legId; });
                if (!leg) return;
                var now = new Date().toISOString();
                leg.logStatus = 'COMPLETE'; leg.onBlocks = now;
                localStorage.setItem(key, JSON.stringify(cached));
                if (window.currentBriefingMission && String(window.currentBriefingMission.id || '') === missionId) {
                  var ml = (window.currentBriefingMission.legs || []).find(function(l) { return String(l.flightLegId || '') === legId; });
                  if (ml) { ml.logStatus = 'COMPLETE'; ml.onBlocks = now; }
                }
              } catch(e) { console.warn('autoLog on-blocks cache fallback failed', e); }
            })();
            _enrouteDiag('AUTO-LOG: on-blocks fallback cache written');
            if (window.M) M.toast({ html: 'On blocks recorded', classes: 'green' });
            if (typeof window.switchTab === 'function') window.switchTab(8);
          }
        } else {
          var al = window.enroute6.autoLog;
          al.state = 'AIRBORNE'; al.belowTs = 0; al.promptShown = false;
          _enrouteDiag('AUTO-LOG: on-blocks dismissed, monitoring resumed');
          _autoLogUpdateChip();
        }
      };

      function _autoLogPromptOnBlocks() {
        var al = window.enroute6.autoLog || {};
        var landedThreshold = Number(al.landedThresholdKts || 30);
        _enrouteDiag('AUTO-LOG: on-blocks prompt shown');
        if (window.M) {
          var html = '<span style="margin-right:8px;">🛬 On blocks? Speed <' + landedThreshold + ' kts for 45s</span>'
            + '<button class="btn btn-flat toast-action" onclick="window._autoLogConfirmOnBlocks(true)" style="color:#a5d6a7;font-weight:800;">ON BLOCKS</button>'
            + '<button class="btn btn-flat toast-action" onclick="window._autoLogConfirmOnBlocks(false)" style="color:#ef9a9a;">DISMISS</button>';
          M.toast({ html: html, displayLength: 30000, classes: 'blue-grey darken-4' });
        }
      }

      function _autoLogTick(gsKts) {
        var al = window.enroute6.autoLog;
        if (!al || !al.enabled) return;
        var airborneConfirmKts = Number(al.airborneConfirmKts || 40);
        var landedThresholdKts = Number(al.landedThresholdKts || 30);
        var onBlocksPromptMs = Number(al.onBlocksPromptMs || 45000);
        var now = Date.now();
        var prev = al.prevGsKts;
        al.prevGsKts = gsKts;
        var legId = String(window.enroute6.flightLegId || '');
        var mission = window.currentBriefingMission;
        var currentLeg = (mission && Array.isArray(mission.legs))
          ? mission.legs.find(function(l) { return String(l.flightLegId || '') === legId; })
          : null;
        var legStatus = currentLeg ? (currentLeg.logStatus || 'PENDING') : 'PENDING';
        if (legStatus === 'COMPLETE') { al.state = 'LOCKED'; _autoLogUpdateChip(); return; }
        if (al.state === 'LOCKED') { _autoLogUpdateChip(); return; }
        if ((al.state === 'GROUND' || al.state === 'ROLLING') && legStatus === 'DEPARTED') {
          al.state = 'AIRBORNE'; al.airborneConfirmed = true; al.brakesReleaseFired = true; al.airborneTs = now;
          _autoLogUpdateChip(); return;
        }
        if (al.state === 'GROUND') {
          if (!al.brakesReleaseFired && prev < 8 && gsKts >= 10 && (gsKts - prev) >= 1.5) {
            al.state = 'ROLLING'; al.aboveTs = 0; al.brakesReleaseFired = true;
            _autoLogFireBrakesRelease();
          }
        } else if (al.state === 'ROLLING') {
          if (gsKts < 5) {
            al.state = 'GROUND'; al.aboveTs = 0;
            _enrouteDiag('AUTO-LOG: roll aborted (speed < 5 kts)');
          } else if (gsKts >= airborneConfirmKts || (window.enroute6 && window.enroute6.takeoffRoll && window.enroute6.takeoffRoll.vrHit)) {
            if (!al.aboveTs) al.aboveTs = now;
            if ((now - al.aboveTs) >= 4000 && !al.airborneConfirmed) {
              al.airborneConfirmed = true; al.state = 'AIRBORNE'; al.airborneTs = now; _autoLogFireAirborne();
            }
          } else {
            al.aboveTs = 0;
          }
        } else if (al.state === 'AIRBORNE') {
          if (gsKts < landedThresholdKts) {
            // Guard: must have been airborne for at least 15 seconds to avoid false
            // "landed" trigger during the takeoff roll acceleration phase
            if ((now - (al.airborneTs || 0)) < 15000) { _autoLogUpdateChip(); return; }
            if (!al.belowTs) al.belowTs = now;
            al.state = 'LANDING';
            if (!al.landedFired) { al.landedFired = true; _autoLogFireLanded(); }
          }
        } else if (al.state === 'LANDING') {
          if (gsKts >= airborneConfirmKts) {
            al.state = 'AIRBORNE'; al.belowTs = 0; al.promptShown = false; al.landedFired = false;
            al.touchAndGoCount = (al.touchAndGoCount || 0) + 1;
            _autoLogFireTouchAndGo(al.touchAndGoCount);
          } else if ((now - al.belowTs) >= onBlocksPromptMs && !al.promptShown) {
            al.promptShown = true; _autoLogPromptOnBlocks();
          }
        }
        _autoLogUpdateChip();
      }

      // DIRECT TO
      // ============================================================

      window.directToWaypoint = function(tgtIdx) {
        var e = window.enroute6;
        var wps = e.waypoints;
        if (!wps || tgtIdx < 0 || tgtIdx >= wps.length) return;
        var tgtFix = wps[tgtIdx].fix;
        var bypassTs = _enrouteFmtHhmm(new Date());
        for (var i = e.passedIndex + 1; i < tgtIdx; i++) {
          if (!wps[i].passedAt) wps[i].bypassedAt = bypassTs;
        }
        e.passedIndex = tgtIdx - 1;
        e.directToTargetIdx = tgtIdx;
        e.hideDirectToLine = false;
        if (e.directToLayer) { e.mapObj.removeLayer(e.directToLayer); e.directToLayer = null; }
        renderEnrouteWaypointRows();
        _enrouteRefreshRouteLayer();
        _enrouteRefreshDirectLayer();
        recalcWaypointsFromGs();
        if (window.M) M.toast({ html: '➡ Direct to ' + tgtFix, classes: 'purple darken-2', displayLength: 4000 });
        _enrouteDiag('DIRECT TO ' + tgtFix + ' (idx=' + tgtIdx + ')');
      };

      function _enrouteRefreshDirectLayer() {
        var e = window.enroute6;
        if (!e.mapObj || !window.L) return;
        if (e.directToLayer && e.hideDirectToLine) {
          if (e.mapObj.hasLayer(e.directToLayer)) e.mapObj.removeLayer(e.directToLayer);
          e.directToLayer = null;
        }
        if (e.hideDirectToLine) return;
        var targetIdx = Number(e.directToTargetIdx);
        if (!isFinite(targetIdx) || targetIdx < 0 || e.lat == null || e.lon == null) {
          if (e.directToLayer && e.mapObj.hasLayer(e.directToLayer)) e.mapObj.removeLayer(e.directToLayer);
          return;
        }
        if (targetIdx >= (e.waypoints || []).length) {
          if (e.directToLayer && e.mapObj.hasLayer(e.directToLayer)) e.mapObj.removeLayer(e.directToLayer);
          return;
        }
        var nextFix = e.waypoints[targetIdx].fix;
        var coord = _lookupFix(nextFix);
        if (!coord) {
          if (e.directToLayer && e.mapObj.hasLayer(e.directToLayer)) e.mapObj.removeLayer(e.directToLayer);
          return;
        }
        var latLngs = [[e.lat, e.lon], [coord.lat, coord.lon]];
        if (!e.directToLayer) {
          e.directToLayer = window.L.polyline(
            latLngs,
            { color: '#ad1457', weight: 4, opacity: 0.95, dashArray: '10 6' }
          );
        } else {
          e.directToLayer.setLatLngs(latLngs);
        }
        if (!e.mapObj.hasLayer(e.directToLayer)) e.directToLayer.addTo(e.mapObj);
        e.directToLayer.bindTooltip('DIRECT → ' + nextFix, { direction: 'center', permanent: false });
      }

  function _enrouteDefaultTileTemplate() {
    return 'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png';

  function _enrouteGetTileTemplate() {
    return window.enroute6.tileTemplate || String(localStorage.getItem('enrouteTileTemplate') || '').trim() || _enrouteDefaultTileTemplate();

  // ============================================================
  // PHASE 3 — Offline Map Pack (IndexedDB tile cache)
  // ============================================================

  const _IDB_NAME  = 'enrouteMapPackDB';
  const _IDB_STORE = 'tiles';
  let   _idbInst   = null;
  let   _packDownloadActive = false;

  function _idbOpen() {
    return new Promise(function(resolve, reject) {
      if (_idbInst) { resolve(_idbInst); return; }
      const req = indexedDB.open(_IDB_NAME, 1);
      req.onupgradeneeded = function(e) {
        const db = e.target.result;
        if (!db.objectStoreNames.contains(_IDB_STORE)) db.createObjectStore(_IDB_STORE);
      };
      req.onsuccess = function(e) { _idbInst = e.target.result; resolve(_idbInst); };
      req.onerror   = function(e) { reject(e.target.error); };
    });
  }

  function _idbPut(key, val) {
    return _idbOpen().then(function(db) {
      return new Promise(function(resolve, reject) {
        const tx = db.transaction(_IDB_STORE, 'readwrite');
        tx.objectStore(_IDB_STORE).put(val, key);
        tx.oncomplete = resolve;
        tx.onerror    = function(e) { reject(e.target.error); };
      });
    });
  }

  function _idbGet(key) {
    return _idbOpen().then(function(db) {
      return new Promise(function(resolve, reject) {
        const tx  = db.transaction(_IDB_STORE, 'readonly');
        const req = tx.objectStore(_IDB_STORE).get(key);
        req.onsuccess = function(e) { resolve(e.target.result || null); };
        req.onerror   = function(e) { reject(e.target.error); };
      });
    });
  }

  function _idbGetTile(z, x, y) {
    return _idbGet('t_' + z + '_' + x + '_' + y).catch(function() { return null; });
  }

  function _idbPutTile(z, x, y, blob) {
    return _idbPut('t_' + z + '_' + x + '_' + y, blob);
  }

  function _idbGetPackMeta() {
    return _idbGet('meta_pack').catch(function() { return null; });
  }

  function _idbPutPackMeta(meta) {
    return _idbPut('meta_pack', meta).catch(function() {});
  }

  function _idbClearAll() {
    return _idbOpen().then(function(db) {
      return new Promise(function(resolve) {
        try {
          const tx = db.transaction(_IDB_STORE, 'readwrite');
          tx.objectStore(_IDB_STORE).clear();
          tx.oncomplete = resolve;
          tx.onerror    = resolve;
        } catch(e) { resolve(); }
      });
    }).catch(function() {});
  }

  function _idbCountTiles() {
    return _idbOpen().then(function(db) {
      return new Promise(function(resolve) {
        try {
          const tx = db.transaction(_IDB_STORE, 'readonly');
          const req = tx.objectStore(_IDB_STORE).count();
          req.onsuccess = function(e) { resolve(Number(e.target.result || 0)); };
          req.onerror = function() { resolve(0); };
        } catch (e) {
          resolve(0);
        }
      });
    }).catch(function() { return 0; });
  }

  // --- Tile coordinate math (slippy map standard) ---

  function _latLonToTile(lat, lon, zoom) {
    const n    = Math.pow(2, zoom);
    const x    = Math.floor((lon + 180) / 360 * n);
    const lRad = lat * Math.PI / 180;
    const y    = Math.floor((1 - Math.log(Math.tan(lRad) + 1 / Math.cos(lRad)) / Math.PI) / 2 * n);
    return { x: Math.max(0, Math.min(n - 1, x)), y: Math.max(0, Math.min(n - 1, y)) };
  }

  function _enumTiles(minLat, minLon, maxLat, maxLon, minZoom, maxZoom) {
    const tiles = [];
    for (let z = minZoom; z <= maxZoom; z++) {
      const tl = _latLonToTile(maxLat, minLon, z);
      const br = _latLonToTile(minLat, maxLon, z);
      for (let x = tl.x; x <= br.x; x++) {
        for (let y = tl.y; y <= br.y; y++) {
          tiles.push({ z: z, x: x, y: y });
        }
      }
    }
    return tiles;
  }

  function _enumTilesForBboxes(bboxes, minZoom, maxZoom) {
    const seen = new Set();
    const out = [];
    (Array.isArray(bboxes) ? bboxes : []).forEach(function(b) {
      if (!b) return;
      const minLat = Number(b.minLat);
      const minLon = Number(b.minLon);
      const maxLat = Number(b.maxLat);
      const maxLon = Number(b.maxLon);
      if (![minLat, minLon, maxLat, maxLon].every(isFinite)) return;
      _enumTiles(minLat, minLon, maxLat, maxLon, minZoom, maxZoom).forEach(function(t) {
        const key = t.z + '_' + t.x + '_' + t.y;
        if (seen.has(key)) return;
        seen.add(key);
        out.push(t);
      });
    });
    return out;
  }

  function _tileUrlFromTemplate(template, z, x, y) {
    const subs = ['a', 'b', 'c'];
    const s    = subs[Math.floor(Math.random() * 3)];
    return template.replace('{z}', z).replace('{x}', x).replace('{y}', y).replace('{s}', s);
  }

  function _enrouteWaypointsBbox(bufferDeg) {
    const buf    = Number(bufferDeg || 0.5);
    const wps    = Array.isArray(window.enroute6.waypoints) ? window.enroute6.waypoints : [];
    const coords = wps.map(function(wp) { return _lookupFix(wp.fix); }).filter(Boolean);
    if (!coords.length) return null;
    const lats = coords.map(function(c) { return c.lat; });
    const lons = coords.map(function(c) { return c.lon; });
    return {
      minLat: Math.min.apply(null, lats) - buf,
      maxLat: Math.max.apply(null, lats) + buf,
      minLon: Math.min.apply(null, lons) - buf,
      maxLon: Math.max.apply(null, lons) + buf
    };
  }

  function _offlineWacBbox() {
    return { minLat: -34.0, maxLat: 6.0, minLon: -74.0, maxLon: -28.0 };
  }

  function _offlineAirportCoverageBboxes(bufferDeg) {
    const buf = Math.max(0.08, Number(bufferDeg || 0.2));
    const airports = (window.appData && Array.isArray(window.appData.airports)) ? window.appData.airports : [];
    const withCoords = airports.map(function(apt) {
      const lat = Number(apt && apt.lat);
      const lon = Number(apt && apt.lon);
      if (!isFinite(lat) || !isFinite(lon)) return null;
      return {
        minLat: Math.max(-85, lat - buf),
        maxLat: Math.min(85, lat + buf),
        minLon: Math.max(-180, lon - buf),
        maxLon: Math.min(180, lon + buf)
      };
    }).filter(Boolean);
    return withCoords.length ? withCoords : [_offlineWacBbox()];
  }

  function _offlinePackDefaults(scope) {
    if (String(scope || 'base').toLowerCase() === 'route') {
      return { minZoom: 7, maxZoom: 11, label: 'Route pack' };
    }
    return { minZoom: 6, maxZoom: 10, label: 'Airport coverage pack' };
  }

  function _packDateLabel(isoDate) {
    const d = new Date(isoDate || '');
    if (isNaN(d.getTime())) return '';
    const months = ['Jan.', 'Feb.', 'Mar.', 'Apr.', 'May.', 'Jun.', 'Jul.', 'Aug.', 'Sep.', 'Oct.', 'Nov.', 'Dec.'];
    const month = months[d.getMonth()] || '---';
    return month + ' ' + d.getDate() + ', ' + d.getFullYear();
  }

  function _offlinePackBboxes(scope) {
    if (String(scope || 'base').toLowerCase() === 'route') {
      const route = _enrouteWaypointsBbox(0.5);
      return route ? [route] : [];
    }
    return _offlineAirportCoverageBboxes(0.2);
  }

  function _setOfflineMapDbIndicator(state, label) {
    const dot = document.getElementById('rdot-mapdb');
    const text = document.getElementById('rlabel-mapdb');
    if (text) text.textContent = label || 'Checking…';
    if (dot) {
      const colors = { none: '#bdbdbd', ok: '#2e7d32', warn: '#f9a825', expired: '#d32f2f', syncing: '#1565c0' };
      dot.style.background = colors[state] || colors.none;
    }
    // Update shared readiness state
    const stateMap = { ok: 'ok', syncing: 'sync', expired: 'bad', warn: 'warn', none: 'none' };
    if (window._readinessState) window._readinessState.mapdb = stateMap[state] || 'none';
    if (typeof window._recomputeOverallReadiness_ === 'function') window._recomputeOverallReadiness_();
  }

  // --- Pack status display ---

  function _renderPackStatusFromMeta(meta) {
    const els = [document.getElementById('enroute-mappack-status'), document.getElementById('offline-map-status')].filter(Boolean);
    if (!meta || !meta.savedAt) {
      els.forEach(function(el) {
        el.textContent = 'Maps not downloaded.';
        el.className   = 'pack-status pack-none';
      });
      _setOfflineMapDbIndicator('none', 'Not downloaded');
      return;
    }
    const ageDays = Math.floor((Date.now() - new Date(meta.savedAt).getTime()) / 86400000);
    const dateLabel = _packDateLabel(meta.savedAt);
    const maxFreshDays = 15;
    if (ageDays > maxFreshDays) {
      els.forEach(function(el) {
        el.textContent = '✖ MAPS EXPIRED — last download ' + (dateLabel || 'unknown date');
        el.className   = 'pack-status pack-expired';
      });
      _setOfflineMapDbIndicator('expired', 'Expired');
    } else {
      els.forEach(function(el) {
        el.textContent = '✔ MAPS DOWNLOADED — ' + (dateLabel || 'date unavailable');
        el.className   = 'pack-status pack-ok';
      });
      _setOfflineMapDbIndicator('ok', 'Ready');
    }
  }

  function _updatePackStatus() {
    const els = [document.getElementById('enroute-mappack-status'), document.getElementById('offline-map-status')].filter(Boolean);
    const metaRaw = localStorage.getItem('enrouteMapPackMeta');
    if (!metaRaw) {
      _idbGetPackMeta().then(function(idbMeta) {
        if (idbMeta && idbMeta.savedAt) {
          try { localStorage.setItem('enrouteMapPackMeta', JSON.stringify(idbMeta)); } catch (e) {}
          _renderPackStatusFromMeta(idbMeta);
          return;
        }
        _idbCountTiles().then(function(tileCount) {
          if (tileCount > 0) {
            els.forEach(function(el) {
              el.textContent = '✔ Maps cached — tap ↺ MAPS to verify / re-sync';
              el.className   = 'pack-status pack-ok';
            });
            _setOfflineMapDbIndicator('ok', 'Maps cached');
          } else {
            els.forEach(function(el) {
              el.textContent = 'Maps not downloaded.';
              el.className   = 'pack-status pack-none';
            });
            _setOfflineMapDbIndicator('none', 'Not downloaded');
          }
        });
      });
      return;
    }
    let meta;
    try { meta = JSON.parse(metaRaw); } catch(e) { meta = null; }
    _renderPackStatusFromMeta(meta);
  }

  window.refreshOfflineMapPackStatus = _updatePackStatus;

  // --- Custom Leaflet offline-first tile layer ---

  function _enrouteApplyOfflineTileLayer() {
    if (!window.enroute6.mapObj || !window.L) return;
    if (window.enroute6.mapTiles) {
      window.enroute6.mapObj.removeLayer(window.enroute6.mapTiles);
      window.enroute6.mapTiles = null;
    }
    const template = _enrouteGetTileTemplate();
    
    // Use standard L.TileLayer - OpenStreetMap tiles
    try {
      window.enroute6.mapTiles = window.L.tileLayer(template, {
        maxZoom: 18,
        minZoom: 2,
        attribution: '© OpenStreetMap contributors',
        crossOrigin: 'anonymous',
        subdomains: 'abc'
      });
      window.enroute6.mapTiles.addTo(window.enroute6.mapObj);
      _enrouteDiag('Tile layer applied: ' + template);
    } catch (err) {
      _enrouteDiag('Tile layer error: ' + String(err.message));
      // Fallback to simple OSM
      try {
        window.enroute6.mapTiles = window.L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
          maxZoom: 18,
          minZoom: 2,
          attribution: '© OpenStreetMap',
          crossOrigin: 'anonymous'
        });
        window.enroute6.mapTiles.addTo(window.enroute6.mapObj);
        _enrouteDiag('Fallback tile layer applied');
      } catch (err2) {
        _enrouteDiag('Fallback tile error: ' + String(err2.message));
      }
    }
  }

  // --- Estimate ---

  window.estimateMapPack = function(scope) {
    const defaults = _offlinePackDefaults(scope);
    const bboxes = _offlinePackBboxes(scope);
    if (!bboxes.length) { if (window.M) M.toast({ html: 'No map coverage data available yet', classes: 'orange' }); return; }
    const minZ = Math.max(4,  Number(document.getElementById('enroute-pack-minzoom')?.value || defaults.minZoom));
    const maxZ = Math.max(minZ, Number(document.getElementById('enroute-pack-maxzoom')?.value || defaults.maxZoom));
    const tiles = _enumTilesForBboxes(bboxes, minZ, maxZ);
    const estMB = Math.round(tiles.length * 22 / 1024);
    if (window.M) M.toast({
      html: defaults.label + ': ~' + tiles.length + ' tiles (~' + estMB + ' MB) for zooms ' + minZ + '–' + maxZ + ' across ' + bboxes.length + ' areas',
      classes: 'blue darken-2', displayLength: 6000
    });
    _enrouteDiag(defaults.label + ' estimate: ' + tiles.length + ' tiles z' + minZ + '-' + maxZ);
  };

  // --- Download ---

  window.downloadMapPack = async function(scope) {
    if (_packDownloadActive) {
      if (window.M) M.toast({ html: 'Maps downloading — check progress in Tab 6', classes: 'blue darken-2' });
      return;
    }
    const defaults = _offlinePackDefaults(scope);
    const bboxes = _offlinePackBboxes(scope);
    if (!bboxes.length) { if (window.M) M.toast({ html: 'No map coverage data available yet', classes: 'orange' }); return; }
    const template = _enrouteGetTileTemplate();
    if (!template || template.indexOf('{z}') < 0) {
      if (window.M) M.toast({ html: 'Set a valid tile URL template first', classes: 'orange' });
      return;
    }
    const minEl = document.getElementById('enroute-pack-minzoom');
    const maxEl = document.getElementById('enroute-pack-maxzoom');
    const minZ  = Math.max(4,    Math.min(12, Number(minEl?.value || defaults.minZoom)));
    const maxZ  = Math.max(minZ, Math.min(12, Number(maxEl?.value || defaults.maxZoom)));
    const tiles = _enumTilesForBboxes(bboxes, minZ, maxZ);
    if (tiles.length > 2000) {
      const ok = await window.flightAppConfirm(defaults.label + ' download: ~' + tiles.length + ' tiles (~' + Math.round(tiles.length * 22 / 1024) + ' MB). Proceed?', { title: 'Offline Map Pack', okText: 'Download' });
      if (!ok) return;
    }
    _packDownloadActive = true;
    _setOfflineMapDbIndicator('syncing', 'Syncing…');
    const progDiv = document.getElementById('enroute-pack-progress');
    const progBar = document.getElementById('enroute-pack-bar');
    const progTxt = document.getElementById('enroute-pack-progress-text');
    const packBtn = document.getElementById('enroute-pack-btn');
    if (progDiv) progDiv.style.display = 'block';
    if (packBtn) { packBtn.textContent = 'SYNCING...'; packBtn.disabled = true; }
    let done = 0, failed = 0;
    const BATCH = 6;
    const updateProg = function() {
      const pct = Math.round((done + failed) / tiles.length * 100);
      if (progBar) progBar.style.width = pct + '%';
      if (progTxt) progTxt.textContent = (done + failed) + '/' + tiles.length + ' tiles (' + failed + ' failed)';
    };
    for (let i = 0; i < tiles.length; i += BATCH) {
      if (!_packDownloadActive) break;
      await Promise.all(tiles.slice(i, i + BATCH).map(async function(t) {
        try {
          const url  = _tileUrlFromTemplate(template, t.z, t.x, t.y);
          const resp = await fetch(url, { cache: 'no-store' });
          if (!resp.ok) throw new Error('HTTP ' + resp.status);
          const blob = await resp.blob();
          await _idbPutTile(t.z, t.x, t.y, blob);
          done++;
        } catch(e) { failed++; }
        updateProg();
      }));
    }
    _packDownloadActive = false;
    if (packBtn) { packBtn.textContent = 'SYNC MAPS'; packBtn.disabled = false; }
    const meta = {
      missionId:  window.enroute6.missionId || 'unknown',
      scope:      String(scope || 'base').toLowerCase(),
      savedAt:    new Date().toISOString(),
      tileCount:  done,
      failedCount: failed,
      bboxes:     bboxes,
      minZoom:    minZ,
      maxZoom:    maxZ,
      tileTemplate: template
    };
    localStorage.setItem('enrouteMapPackMeta', JSON.stringify(meta));
    _idbPutPackMeta(meta);
    _updatePackStatus();
    _enrouteDiag('Pack downloaded: ' + done + '/' + tiles.length + ' tiles');
    if (window.M) M.toast({
      html: '\uD83D\uDCE6 ' + defaults.label + ' ready: ' + done + ' tiles' + (failed ? ' (' + failed + ' failed)' : ''),
      classes: done > 0 ? 'green' : 'orange', displayLength: 6000
    });
    if (done > 0) _enrouteApplyOfflineTileLayer();
  };

  // --- Clear ---

  window.clearMapPack = async function() {
    const ok = await window.flightAppConfirm('Clear all cached map tiles?', { title: 'Offline Map Pack', okText: 'Clear' });
    if (!ok) return;
    await _idbClearAll();
    localStorage.removeItem('enrouteMapPackMeta');
    _packDownloadActive = false;
    _updatePackStatus();
    _enrouteApplyTileLayer();
    if (window.M) M.toast({ html: 'Map pack cleared', classes: 'orange' });
    _enrouteDiag('Pack cleared');
  };

  // Silent clear used by the combined Tab1 CLEAR button (confirm already shown there)
  window.clearMapPackDirect = async function() {
    await _idbClearAll();
    localStorage.removeItem('enrouteMapPackMeta');
    _packDownloadActive = false;
    _updatePackStatus();
    if (typeof _enrouteApplyTileLayer === 'function') _enrouteApplyTileLayer();
    _enrouteDiag('Map pack cleared (direct)');
  };

  // ============================================================
  // END PHASE 3
  // ============================================================

  function _enrouteWaypointPoints() {
    const waypoints = Array.isArray(window.enroute6.waypoints) ? window.enroute6.waypoints : [];
    return waypoints.map((wp, idx) => {
      const coord = _lookupFix(wp.fix);
      if (!coord) return null;
      return {
        idx: idx,
        fix: String(wp.fix || ''),
        lat: Number(coord.lat),
        lon: Number(coord.lon),
        eta: String(wp.eta || '--:--'),
        distNm: Number(wp.distNm || 0)
      };
    }).filter(Boolean);
  }

  function _enrouteRefreshRouteLayer() {
    if (!window.enroute6.mapObj || !window.L) return;
    const points = _enrouteWaypointPoints();

    if (!points.length) {
      if (window.enroute6.routeLayer) {
        window.enroute6.mapObj.removeLayer(window.enroute6.routeLayer);
        window.enroute6.routeLayer = null;
      }
      if (window.enroute6.waypointLayer) {
        window.enroute6.mapObj.removeLayer(window.enroute6.waypointLayer);
        window.enroute6.waypointLayer = null;
      }
      window.enroute6.lastWaypointPoints = null;
      return;
    }

    const directToStartIdx = Number(window.enroute6.directToTargetIdx);
    const startIdx = (isFinite(directToStartIdx) && directToStartIdx >= 0)
      ? directToStartIdx
      : Math.max(0, Number(window.enroute6.passedIndex || -1) + 1);
    const pointsCached = JSON.stringify(points);
    const unchanged = (startIdx === window.enroute6.lastRouteStartIdx && pointsCached === window.enroute6.lastWaypointPoints);
    if (unchanged) {
      return;
    }

    if (window.enroute6.routeLayer) {
      window.enroute6.mapObj.removeLayer(window.enroute6.routeLayer);
      window.enroute6.routeLayer = null;
    }
    if (window.enroute6.waypointLayer) {
      window.enroute6.mapObj.removeLayer(window.enroute6.waypointLayer);
      window.enroute6.waypointLayer = null;
    }

    const routePoints = points.slice(startIdx);
    if (window.enroute6.routeVisible && routePoints.length > 1) {
      const routeLatLng = routePoints.map(p => [p.lat, p.lon]);
      window.enroute6.routeLayer = window.L.polyline(routeLatLng, {
        color: '#1565c0',
        weight: 4,
        opacity: 0.9
      }).addTo(window.enroute6.mapObj);
    }

    window.enroute6.waypointLayer = window.L.layerGroup();
    const _routeAirports = (window.appData && Array.isArray(window.appData.airports)) ? window.appData.airports : [];
    const _routeFuelCaches = (window.appData && Array.isArray(window.appData.fuelCaches)) ? window.appData.fuelCaches : [];
    points.forEach(function(p) {
      const passed = p.idx <= Number(window.enroute6.passedIndex || -1);
      const aptRecord = _routeAirports.find(function(a) {
        return String(a.icao || '').trim().toUpperCase() === String(p.fix || '').trim().toUpperCase();
      });
      let marker;
      let fuelPopupLine = '';
      if (aptRecord) {
        const hasFuel = !!(String(aptRecord.fuelAvailable || '').trim()
          && String(aptRecord.fuelAvailable || '').trim().toUpperCase() !== 'NONE');
        const hasCacheFuel = !!_routeFuelCaches.find(function(c) {
          return String(c && c.icao || '').trim().toUpperCase() === String(aptRecord.icao || '').trim().toUpperCase()
            && Number(c && c.qty || 0) > 0;
        });
        const anyFuel = hasFuel || hasCacheFuel;
        fuelPopupLine = '<br>' + (anyFuel ? '⛽ Fuel: ' + (hasFuel ? aptRecord.fuelAvailable : 'Cache') : 'No fuel available');
        marker = window.L.marker([p.lat, p.lon], { icon: _enrouteAirportDivIcon(aptRecord.runwaySurfaceActual, anyFuel) });
      } else {
        // Pure waypoint — small circle
        marker = window.L.circleMarker([p.lat, p.lon], {
          radius: 5,
          color: passed ? '#2e7d32' : '#0b5394',
          fillColor: passed ? '#81c784' : '#42a5f5',
          fillOpacity: 0.95,
          weight: 2,
          opacity: passed ? 0.6 : 1
        });
      }
      const legDist = (p.distNm != null) ? Math.round(p.distNm) + ' nm' : '? nm';
      marker.bindPopup('<b>' + p.fix + '</b><br>ETA ' + p.eta + '<br>Leg ' + legDist + fuelPopupLine);
      window.enroute6.waypointLayer.addLayer(marker);
    });
    window.enroute6.waypointLayer.addTo(window.enroute6.mapObj);

    window.enroute6.lastRouteStartIdx = startIdx;
    window.enroute6.lastWaypointPoints = pointsCached;
    if (!window.enroute6.mapLoadedOnce) {
      if (window.enroute6.routeLayer) {
        window.enroute6.mapObj.fitBounds(window.enroute6.routeLayer.getBounds(), { padding: [24, 24] });
      } else if (window.enroute6.waypointLayer) {
        window.enroute6.mapObj.fitBounds(window.enroute6.waypointLayer.getBounds(), { padding: [24, 24] });
      }
      window.enroute6.mapLoadedOnce = true;
    }
  }

  function _enrouteInvalidateMapSize_(centerIfNeeded) {
    const mapObj = window.enroute6 && window.enroute6.mapObj;
    if (!mapObj || typeof mapObj.invalidateSize !== 'function') return;

    const refresh = function() {
      try {
        mapObj.invalidateSize(true);
      } catch (e) {}

      if (centerIfNeeded && window.enroute6 && window.enroute6.aircraftLayer) {
        const lat = Number(window.enroute6.lat);
        const lon = Number(window.enroute6.lon);
        if (isFinite(lat) && isFinite(lon)) {
          try { mapObj.panTo([lat, lon], { animate: false }); } catch (e2) {}
        }
      }
    };

    refresh();
    setTimeout(refresh, 120);
    setTimeout(refresh, 420);
  }

  function _enrouteAircraftDivIcon(bearing) {
    // Clean top-down aircraft silhouette that rotates to show direction of travel
    var hdg = (isFinite(Number(bearing)) ? Number(bearing) : 0);
    var svg = '<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32"'
      + ' style="transform:rotate(' + hdg + 'deg);transform-origin:center;display:block;">'
      // Fuselage
      + '<ellipse cx="16" cy="16" rx="2.8" ry="11.5" fill="#e3f2fd" stroke="#0d47a1" stroke-width="1.1"/>'
      // Wings (centred slightly forward of midpoint)
      + '<ellipse cx="16" cy="14" rx="13" ry="2.4" fill="#bbdefb" stroke="#0d47a1" stroke-width="1.1"/>'
      // Tail stabiliser
      + '<ellipse cx="16" cy="24.5" rx="5.5" ry="1.6" fill="#bbdefb" stroke="#0d47a1" stroke-width="1"/>'
      // Nose highlight
      + '<ellipse cx="16" cy="5.5" rx="1.8" ry="2.2" fill="#42a5f5"/>'
      + '</svg>';
    return window.L.divIcon({ html: svg, className: '', iconSize: [32, 32], iconAnchor: [16, 16] });
  }

  function _enroutePushBreadcrumb(lat, lon) {
    if (!isFinite(lat) || !isFinite(lon)) return;
    if (window.enroute6.gsKts < 5) return; // only record when actually moving
    var crumbs = window.enroute6.breadcrumbs;
    if (crumbs.length) {
      var last = crumbs[crumbs.length - 1];
      if (_enrouteDistNm(last[0], last[1], lat, lon) < 0.03) return; // < ~55m apart, skip
    }
    crumbs.push([lat, lon]);
    if (crumbs.length > 600) crumbs.splice(0, crumbs.length - 600); // keep last 600 pts
    _enrouteRefreshBreadcrumbLayer();
  }

  function _enrouteRefreshBreadcrumbLayer() {
    if (!window.enroute6.mapObj || !window.L) return;
    var crumbs = window.enroute6.breadcrumbs;
    if (!crumbs.length) return;
    if (window.enroute6.breadcrumbLayer) {
      // Update in-place for performance — just set new latlngs
      window.enroute6.breadcrumbLayer.setLatLngs(crumbs);
    } else {
      window.enroute6.breadcrumbLayer = window.L.polyline(crumbs, {
        color: '#ff8f00',
        weight: 2,
        opacity: 0.7,
        smoothFactor: 2
      }).addTo(window.enroute6.mapObj);
    }
  }

  function _enrouteRefreshAircraftMarker() {
    if (!window.enroute6.mapObj || !window.L) return;
    const lat = Number(window.enroute6.lat);
    const lon = Number(window.enroute6.lon);
    if (!isFinite(lat) || !isFinite(lon)) return;
    const bearing = Number(window.enroute6.bearing || 0);

    if (!window.enroute6.aircraftLayer) {
      window.enroute6.aircraftLayer = window.L.marker([lat, lon], {
        icon: _enrouteAircraftDivIcon(bearing),
        zIndexOffset: 1000
      }).addTo(window.enroute6.mapObj);
      window.enroute6.aircraftLayer.bindTooltip('Aircraft', { direction: 'top', offset: [0, -8] });
      return;
    }
    window.enroute6.aircraftLayer.setLatLng([lat, lon]);
    // Update icon rotation when bearing changes by more than 3°
    const prevBearing = Number(window.enroute6._lastRenderedBearing || -999);
    if (Math.abs(bearing - prevBearing) > 3) {
      window.enroute6.aircraftLayer.setIcon(_enrouteAircraftDivIcon(bearing));
      window.enroute6._lastRenderedBearing = bearing;
    }
  }

  function _enrouteValidLatLon_(lat, lon) {
    return isFinite(Number(lat)) && isFinite(Number(lon))
      && Math.abs(Number(lat)) <= 90
      && Math.abs(Number(lon)) <= 180
      && !(Math.abs(Number(lat)) < 0.25 && Math.abs(Number(lon)) < 0.25);
  }

  function _enrouteInitialCenter_() {
    const e = window.enroute6 || {};
    const lat = Number(e.lat);
    const lon = Number(e.lon);
    if (_enrouteValidLatLon_(lat, lon)) return { lat: lat, lon: lon, zoom: 10 };

    const pts = _enrouteWaypointPoints();
    if (pts && pts.length) {
      return { lat: Number(pts[0].lat), lon: Number(pts[0].lon), zoom: 8 };
    }
    return { lat: -14.235, lon: -51.925, zoom: 5 };
  }

  function _enrouteInitMap() {
    _enrouteEnsureLeaflet(function() {
      try {
        const host = document.getElementById('enroute-leaflet-map');
        if (!host) { _enrouteDiag('Map host element not found'); return; }
        if (!window.L) { _enrouteDiag('Leaflet library (L) not loaded'); return; }
        if (!window.L.map) { _enrouteDiag('L.map is not a function'); return; }

        if (!window.enroute6.mapObj) {
          try {
            const c = _enrouteInitialCenter_();
            window.enroute6.mapObj = window.L.map('enroute-leaflet-map', {
              zoomControl: true,
              attributionControl: true,
              preferCanvas: false
            }).setView([c.lat, c.lon], c.zoom);
            _enrouteDiag('Map object created successfully');
          } catch (mapErr) {
            _enrouteDiag('Failed to create map object: ' + String(mapErr.message));
            return;
          }
        }

        window.enroute6.mapReady = true;
        _enrouteDiag('Map ready, applying tile layer');
        _enrouteApplyOfflineTileLayer();
        _enrouteRefreshDbLayers();
        _enrouteRefreshRouteLayer();
        _enrouteRefreshAircraftMarker();
        if (_enrouteValidLatLon_(window.enroute6.lat, window.enroute6.lon)) {
          window.enroute6.mapObj.setView([Number(window.enroute6.lat), Number(window.enroute6.lon)], Math.max(window.enroute6.mapObj.getZoom(), 10));
          window.enroute6.mapLoadedOnce = true;
        }
        _enrouteInvalidateMapSize_(true);

        if (!window.enroute6.resizeBound) {
          window.addEventListener('resize', function() {
            _enrouteInvalidateMapSize_(false);
          });
          window.enroute6.resizeBound = true;
        }
        _enrouteDiag('Map initialization complete');
      } catch (e) {
        _enrouteDiag('Map init error: ' + String(e.message));
      }
    });
  }

  function _enrouteAirportDivIcon(surfaceActual, hasFuel) {
    var s = String(surfaceActual || '').toUpperCase();
    var color;
    if (/GRASS|GRAMA|SOD|TURF|CAMPO|TERRA/.test(s)) color = '#388e3c';
    else if (/WATER|\u00C1GUA|AGUA|LAKE|LAGO|HIDRO|FLOAT|SEA/.test(s)) color = '#1565c0';
    else color = '#212121';
    var badge = hasFuel
      ? '<circle cx="15.8" cy="4.2" r="5" fill="white" stroke="#111" stroke-width="1.3"/><text x="15.8" y="5.9" text-anchor="middle" font-size="6.5" fill="#111" font-family="sans-serif" font-weight="900">A</text>'
      : '';
    var svg = '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 20 20">'
      + '<circle cx="10" cy="10" r="9" fill="' + color + '" stroke="white" stroke-width="1.5" opacity="0.92"/>'
      + '<text x="10" y="14" text-anchor="middle" font-size="11" fill="white" font-family="sans-serif" font-weight="bold">✈</text>'
      + badge
      + '</svg>';
    return window.L.divIcon({ html: svg, className: '', iconSize: [20, 20], iconAnchor: [10, 10] });
  }

  function _enrouteWpDbDivIcon() {
    var svg = '<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 14 14">'
      + '<polygon points="7,1 13,13 1,13" fill="#6a1b9a" stroke="white" stroke-width="1.5" opacity="0.9"/>'
      + '</svg>';
    return window.L.divIcon({ html: svg, className: '', iconSize: [14, 14], iconAnchor: [7, 13] });
  }

  function _enrouteRefreshDbLayers() {
    var e = window.enroute6;
    if (!e.mapObj || !window.L) return;

    var airports  = (window.appData && Array.isArray(window.appData.airports))  ? window.appData.airports  : [];
    var wps       = (window.appData && Array.isArray(window.appData.waypoints)) ? window.appData.waypoints : [];

    var centerLat = isFinite(Number(e.lat)) ? Number(e.lat) : Number(e.mapObj.getCenter().lat);
    var centerLon = isFinite(Number(e.lon)) ? Number(e.lon) : Number(e.mapObj.getCenter().lng);
    var airportRadiusNm = 90;
    var waypointRadiusNm = 45;
    var airportLimit = 70;
    var waypointLimit = 120;

    var nearestAirports = airports.map(function(apt) {
      var lat = parseFloat(apt.lat); var lon = parseFloat(apt.lon);
      if (!isFinite(lat) || !isFinite(lon)) return null;
      return { item: apt, lat: lat, lon: lon, dist: _enrouteDistNm(centerLat, centerLon, lat, lon) };
    }).filter(Boolean).sort(function(a, b) { return a.dist - b.dist; });

    var nearestWaypoints = wps.map(function(wp) {
      var lat = parseFloat(wp.lat); var lon = parseFloat(wp.lon);
      if (!isFinite(lat) || !isFinite(lon)) return null;
      return { item: wp, lat: lat, lon: lon, dist: _enrouteDistNm(centerLat, centerLon, lat, lon) };
    }).filter(Boolean).sort(function(a, b) { return a.dist - b.dist; });

    var airportSubset = nearestAirports.filter(function(row) { return row.dist <= airportRadiusNm; }).slice(0, airportLimit);
    var wpSubset = nearestWaypoints.filter(function(row) { return row.dist <= waypointRadiusNm; }).slice(0, waypointLimit);
    if (!airportSubset.length) airportSubset = nearestAirports.slice(0, Math.min(airportLimit, 30));
    if (!wpSubset.length) wpSubset = nearestWaypoints.slice(0, Math.min(waypointLimit, 60));

    if (e.dbAirportLayer && e.mapObj.hasLayer(e.dbAirportLayer)) e.mapObj.removeLayer(e.dbAirportLayer);
    if (e.dbWpLayer && e.mapObj.hasLayer(e.dbWpLayer)) e.mapObj.removeLayer(e.dbWpLayer);
    e.dbAirportLayer = window.L.layerGroup();
    e.dbWpLayer = window.L.layerGroup();

    airportSubset.forEach(function(row) {
      var apt = row.item;
      var hasAirportFuel = !!(String(apt.fuelAvailable || '').trim() && String(apt.fuelAvailable || '').trim().toUpperCase() !== 'NONE');
      var hasCacheFuel = !!((window.appData && Array.isArray(window.appData.fuelCaches))
        ? window.appData.fuelCaches.find(function(cache) {
            return String(cache && cache.icao || '').trim().toUpperCase() === String(apt.icao || '').trim().toUpperCase()
              && Number(cache && cache.qty || 0) > 0;

    for (let p = 0; p < ports.length; p++) {
      for (let i = 0; i < paths.length; i++) {
        const url = 'http://127.0.0.1:' + ports[p] + paths[i];
        _enrouteDiag('TRY ' + url);
        try {
          await _pollTraccarEndpoint(url);
          window.enroute6.endpoint = url;
          const endpointEl = document.getElementById('enroute-api-endpoint');
          if (endpointEl) endpointEl.value = url;

          if (!window.enroute6.mapUrl) {

          }
          _enrouteSetStatus('Traccar endpoint detected: ' + url);

          _enrouteDiag('FAIL ' + url + ' (' + (e && e.message ? e.message : e) + ')');
