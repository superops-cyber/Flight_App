  window.probeTraccarLocal = async function() {
    const paths = ['/api/position', '/api/positions', '/position', '/positions'];
    const ports = [8082, 5055, 8080, 5000];

    for (let p = 0; p < ports.length; p++) {
      for (let i = 0; i < paths.length; i++) {
        const url = 'http://127.0.0.1:' + ports[p] + paths[i];
        _enrouteDiag('TRY ' + url);
        try {
          await _pollTraccarEndpoint(url);
          window.enroute6.endpoint = url;
          const endpointEl = document.getElementById('enroute-api-endpoint');
          if (endpointEl) endpointEl.value = url;

          if (!window.enroute6.mapUrl) {
            const mapEl = document.getElementById('enroute-map-url');
            const root = 'http://127.0.0.1:' + ports[p];
            window.enroute6.mapUrl = root;
            if (mapEl) mapEl.value = root;
          }
          _enrouteSetStatus('Traccar endpoint detected: ' + url);
          _enrouteDiag('FOUND ' + url);
          return;
        } catch (e) {
          _enrouteDiag('FAIL ' + url + ' (' + (e && e.message ? e.message : e) + ')');
        }
      }
    }

    _enrouteSetStatus('No Traccar localhost endpoint detected. Using iPad GPS fallback.');
    _enrouteDiag('No localhost Traccar endpoint detected; switching to GPS fallback');
    _startGeoFallback();
  };

  window.startEnrouteTracking = function(fromManual) {
    const endpointEl = document.getElementById('enroute-api-endpoint');
    const val = String(endpointEl && endpointEl.value || '').trim();

    if (window.enroute6.pollTimer) {
      clearInterval(window.enroute6.pollTimer);
      window.enroute6.pollTimer = null;
    }

    if (val) window.enroute6.endpoint = val;
    if (!window.enroute6.endpoint) {
      probeTraccarLocal();
      return;
    }

    _enrouteSetStatus('Polling Traccar endpoint...');
    _stopGeoFallback();

    const pollOnce = async function() {
      try {
        await _pollTraccarEndpoint(window.enroute6.endpoint);
      } catch (e) {
        _enrouteSetStatus(`Traccar poll failed (${e && e.message ? e.message : e}); fallback GPS active.`);
        _enrouteDiag(`POLL FAIL ${window.enroute6.endpoint} (${e && e.message ? e.message : e})`);
        _startGeoFallback();
      }
    };

    pollOnce();
    window.enroute6.pollTimer = setInterval(pollOnce, 5000);
  };

  function _lookupFix(fixName) {
    const name = String(fixName || '').trim().toUpperCase();
    if (!name) return null;

    const airports = (window.appData && Array.isArray(window.appData.airports)) ? window.appData.airports : [];
    const airport = airports.find(a => String(a.icao || '').trim().toUpperCase() === name);
    if (airport) {
      const lat = Number(airport.lat);
      const lon = Number(airport.lon);
      if (!isNaN(lat) && !isNaN(lon)) return { lat: lat, lon: lon };
    }

    const waypoints = (window.appData && Array.isArray(window.appData.waypoints)) ? window.appData.waypoints : [];
    const waypoint = waypoints.find(w => String(w.wp_id || '').trim().toUpperCase() === name);
    if (waypoint) {
      const lat = Number(waypoint.lat);
      const lon = Number(waypoint.lon);
      if (!isNaN(lat) && !isNaN(lon)) return { lat: lat, lon: lon };
    }

    return null;
  }

  function _calculateDistanceBetween(fix1, fix2) {
    const point1 = _lookupFix(fix1);
    const point2 = _lookupFix(fix2);
    if (!point1 || !point2) return 20;

    const toRad = (d) => d * Math.PI / 180;
    const R = 6371e3;
    const lat1 = toRad(Number(point1.lat));
    const lat2 = toRad(Number(point2.lat));
    const dLat = toRad(Number(point2.lat) - Number(point1.lat));
    const dLon = toRad(Number(point2.lon) - Number(point1.lon));
    const a = Math.sin(dLat/2) * Math.sin(dLat/2)
      + Math.cos(lat1) * Math.cos(lat2) * Math.sin(dLon/2) * Math.sin(dLon/2);
    const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    const meters = R * c;
    return Math.max(1, Math.round(meters / 1852));
  }

  function _recalculateWaypointDistances(waypoints) {
    if (!waypoints || waypoints.length < 2) return;
    
    waypoints[0].distNm = 0;
    
    for (let i = 1; i < waypoints.length; i++) {
      const prevFix = waypoints[i - 1].fix;
      const currFix = waypoints[i].fix;
      waypoints[i].distNm = _calculateDistanceBetween(prevFix, currFix);
    }
  }

  function _estimateDistFromFix(fix) {
    const wp = String(fix || '').trim().toUpperCase();
    if (!wp) return 0;

    const airports = (window.appData && Array.isArray(window.appData.airports)) ? window.appData.airports : [];
    const known = airports.find(a => String(a.icao || '').trim().toUpperCase() === wp);
    if (known && window.enroute6.lat != null && window.enroute6.lon != null && known.lat && known.lon) {
      const toRad = (d) => d * Math.PI / 180;
      const R = 6371e3;
      const lat1 = toRad(Number(window.enroute6.lat));
      const lat2 = toRad(Number(known.lat));
      const dLat = toRad(Number(known.lat) - Number(window.enroute6.lat));
      const dLon = toRad(Number(known.lon) - Number(window.enroute6.lon));
      const a = Math.sin(dLat/2) * Math.sin(dLat/2)
        + Math.cos(lat1) * Math.cos(lat2) * Math.sin(dLon/2) * Math.sin(dLon/2);
      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
      const meters = R * c;
      return Math.max(1, Math.round(meters / 1852));
    }
    return 20;
  }

  function _normalizeWaypointList(rawWaypoints, origin, destination) {
    const org = String(origin || '').trim().toUpperCase();
    const dst = String(destination || '').trim().toUpperCase();

    let tokens = [];
    if (Array.isArray(rawWaypoints)) {
      tokens = rawWaypoints.map(function(wp) { return String(wp || '').trim().toUpperCase(); });
    } else if (typeof rawWaypoints === 'string') {
      const raw = String(rawWaypoints || '').trim().toUpperCase();
      if (raw) {
        tokens = raw
          .replace(/[→>]/g, ',')
          .replace(/\s+-\s+/g, ',')
          .split(/[\n\r,;\/|]+/)
          .map(function(part) { return String(part || '').trim().toUpperCase(); })
          .filter(Boolean);
      }
    }

    // De-dup and remove origin/destination (those are rendered separately)
    const seen = new Set();
    return tokens.filter(function(token) {
      if (!token || token === org || token === dst || seen.has(token)) return false;
      seen.add(token);
      return true;
    });
  }

  function _buildInitialWaypoints(routeData) {
    if (!routeData || !routeData.from) return [];

    const rows = [];

    const origin = String(routeData.from || 'ORIG').trim().toUpperCase();
    rows.push({
      id: `0-${origin}`,
      fix: origin,
      distNm: 0,
      hdg: '--',
      eteMin: 0,
      eta: '--:--',
      passedAt: ''
    });

    const middleWaypoints = _normalizeWaypointList(routeData.waypoints, origin, routeData.to || '');
    if (middleWaypoints.length) {
      middleWaypoints.forEach((wp, idx) => {
        rows.push({
          id: `${idx + 1}-${String(wp).trim()}`,
          fix: String(wp).trim().toUpperCase(),
          distNm: 0,
          hdg: '--',
          eteMin: 0,
          eta: '--:--',
          passedAt: ''
        });
      });
    }

    const destination = String(routeData.to || 'DEST').trim().toUpperCase();
    if (destination !== origin) {
      rows.push({
        id: `${rows.length}-${destination}`,
        fix: destination,
        distNm: 0,
        hdg: '--',
        eteMin: 0,
        eta: '--:--',
        passedAt: ''
      });
    }

    if (rows.length === 1) {
      rows.push({ id: '1-WP1', fix: 'WP1', distNm: 12, hdg: '--', eteMin: 0, eta: '--:--', passedAt: '' });
    }

    _recalculateWaypointDistances(rows);
    _calculateHeadings(rows);
    return rows;
  }

  function _calculateHeadings(waypoints) {
    if (!waypoints || waypoints.length < 2) return;

    for (let i = 0; i < waypoints.length - 1; i++) {
      const fromFix = waypoints[i].fix;
      const toFix = waypoints[i + 1].fix;

      const fromPoint = _lookupFix(fromFix);
      const toPoint = _lookupFix(toFix);

      if (fromPoint && toPoint && fromPoint.lat && fromPoint.lon && toPoint.lat && toPoint.lon) {
        const hdg = _calculateBearing(fromPoint.lat, fromPoint.lon, toPoint.lat, toPoint.lon);
        waypoints[i + 1].hdg = String(hdg).padStart(3, '0') + '°';
      }
    }
  }

  function _calculateBearing(lat1, lon1, lat2, lon2) {
    const toRad = deg => deg * Math.PI / 180;
    const toDeg = rad => rad * 180 / Math.PI;

    const dLon = toRad(lon2 - lon1);
    const y = Math.sin(dLon) * Math.cos(toRad(lat2));
    const x = Math.cos(toRad(lat1)) * Math.sin(toRad(lat2)) -
              Math.sin(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.cos(dLon);
    const bearing = toDeg(Math.atan2(y, x));
    return Math.round((bearing + 360) % 360);
  }

  function _fuelStatusTags() {
    const f = window.enroute6.fuel;
    const total = Number(f.LM || 0) + Number(f.RM || 0) + Number(f.LT || 0) + Number(f.RT || 0);
    const tag = function(label, qty, active) {
      return `<span class="fuel-tag">${label}: ${Math.round(Number(qty || 0))}${active ? '*' : ''}</span>`;
    };
    return [
      tag('LT', f.LT, false),
      tag('LM', f.LM, f.activeMain === 'LM'),
      tag('RM', f.RM, f.activeMain === 'RM'),
      tag('RT', f.RT, false),
      `<span class="fuel-tag">TOT: ${Math.round(total)}</span>`
    ].join('');
  }

  function _enrouteActiveFuelWaypointIdx_() {
    const wps = Array.isArray(window.enroute6.waypoints) ? window.enroute6.waypoints : [];
    if (!wps.length) return -1;
    const nextIdx = Math.max(0, Number(window.enroute6.passedIndex || -1) + 1);
    return Math.min(nextIdx, wps.length - 1);
  }

  function _enrouteRecordFuelEvent_(payload) {
    const idx = _enrouteActiveFuelWaypointIdx_();
    const wps = Array.isArray(window.enroute6.waypoints) ? window.enroute6.waypoints : [];
    const wp = idx >= 0 ? wps[idx] : null;
    if (!wp) return null;
    const usedLiters = Math.max(0, Number(payload && payload.usedLiters || 0));
    if (usedLiters > 0) {
      wp.fuelUsedL = Math.max(0, Number(wp.fuelUsedL || 0)) + usedLiters;
    }
    const note = String(payload && payload.note || '').trim();
    if (note) wp.fuelNote = note;
    wp.fuelEventAt = _enrouteFmtHhmm(new Date());
    return { idx: idx, wp: wp };
  }

  function _enrouteRenderTransferBanner_() {
    const banner = document.getElementById('enroute-transfer-banner');
    if (!banner) return;
    const active = window.enroute6.transferActive || null;
    banner.classList.remove('active', 'complete');
    if (active) {
      const s = Math.max(0, Number(window.enroute6.transferSecondsLeft || 0));
      const mm = String(Math.floor(s / 60)).padStart(2, '0');
      const ss = String(s % 60).padStart(2, '0');
      banner.classList.add('active');
      banner.textContent = `${active.tip} transfer running to ${active.main}. Tap ${active.tip} again to stop. ${mm}:${ss}`;
      return;
    }
    if (window.enroute6.lastTransferMessage) {
      banner.classList.add('complete');
      banner.textContent = window.enroute6.lastTransferMessage;
      return;
    }
    banner.textContent = '';
  }

  function _enrouteFuelCellHtml_(idx, isNext) {
    const f = window.enroute6.fuel || {};
    const activeTransfer = window.enroute6.transferActive || null;
    if (!isNext) {
      const wp = window.enroute6.waypoints[idx] || {};
      return `${_fuelStatusTags()}${wp.fuelNote ? `<span class="fuel-note">${wp.fuelNote}</span>` : ''}`;
    }
    return `
      <div class="fuel-cell-stack">
        <div class="fuel-cell-grid">
          ${['LT', 'LM', 'RM', 'RT'].map(function(tank) {
            const isMain = tank === 'LM' || tank === 'RM';
            const isActiveMain = isMain && tank === f.activeMain;
            const isTransferLive = !!(activeTransfer && activeTransfer.tip === tank);
            return `<button class="fuel-chip-btn ${isActiveMain ? 'active-main' : ''} ${isTransferLive ? 'transfer-live' : ''}" onclick="tapFuelTank('${tank}')"><span>${tank}: ${Math.round(Number(f[tank] || 0))}</span></button>`;
          }).join('')}
        </div>
        <div class="fuel-cell-hint">Tap other main to switch. Tap a tip to start or stop transfer.</div>
      </div>`;
  }

  function _enrouteDispatchRecipients_() {
    return ['acompanhamento@asasdesocorro.org.br', 'supervisor.voo@asasdesocorro.org.br'];
  }

  function _enrouteFmtZuluHhmm_(dateObj) {
    if (!(dateObj instanceof Date) || isNaN(dateObj.getTime())) return '----Z';
    const hh = String(dateObj.getUTCHours()).padStart(2, '0');
    const mm = String(dateObj.getUTCMinutes()).padStart(2, '0');
    return `${hh}${mm}Z`;
  }

  async function _enrouteCopyText_(text) {
    const content = String(text || '').trim();
    if (!content) return false;
    try {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        await navigator.clipboard.writeText(content);
        return true;
      }
    } catch (e) {}

    try {
      const ta = document.createElement('textarea');
      ta.value = content;
      ta.setAttribute('readonly', 'readonly');
      ta.style.position = 'fixed';
      ta.style.left = '-9999px';
      document.body.appendChild(ta);
      ta.select();
      const ok = document.execCommand('copy');
      document.body.removeChild(ta);
      return !!ok;
    } catch (e2) {
      return false;
    }
  }

  function _enrouteBuildPassageReport_(idx) {
    const e = window.enroute6 || {};
    const wps = Array.isArray(e.waypoints) ? e.waypoints : [];
    const wp = wps[idx] || null;
    if (!wp) return null;

    const now = new Date();
    const passedFix = String(wp.fix || 'UNKNOWN');
    const passedZulu = _enrouteFmtZuluHhmm_(now);

    const nextWp = wps[idx + 1] || null;
    let estimateLine = 'Estimate position -- at ----Z';
    if (nextWp) {
      const gs = Number(e.gsKts || 0);
      const dist = Math.max(0, Number(nextWp.distNm || 0));
      if (gs > 0 && dist > 0) {
        const eta = new Date(now.getTime() + Math.round((dist / gs) * 3600000));
        estimateLine = `Estimate position ${nextWp.fix} at ${_enrouteFmtZuluHhmm_(eta)}`;
      } else {
        estimateLine = `Estimate position ${nextWp.fix} at ----Z`;
      }
    }

    const popup = `Passed location ${passedFix} at ${passedZulu}. ${estimateLine}`;
    const emailBody = [
      'ENROUTE STATION PASSAGE REPORT',
      `Mission: ${String(e.missionId || 'N/A')}`,
      `Leg: ${String(e.flightLegId || 'N/A')}`,
      '',
      `Passed location ${passedFix} at ${passedZulu}`,
      estimateLine
    ].join('\n');

    return {
      popupText: popup,
      earthmateText: `${passedFix} ${passedZulu}. ${estimateLine.replace('Estimate position ', 'EST ')}`,
      emailSubject: `Station Passage ${passedFix} ${passedZulu}`,
      emailBody: emailBody
    };
  }

  async function _enrouteHandleStationPass_(idx) {
    const report = _enrouteBuildPassageReport_(idx);
    if (!report) return;

    const online = !!(navigator.onLine && window.google && google.script && google.script.run);
    if (online) {
      if (typeof window.flightAppAlert === 'function') {
        await window.flightAppAlert(report.popupText, { title: 'Station Passage' });
      } else if (window.M) {
        M.toast({ html: report.popupText, classes: 'green', displayLength: 7000 });
      }

      google.script.run
        .withSuccessHandler(function() {
          if (window.M) M.toast({ html: 'Station passage emailed to dispatch', classes: 'green', displayLength: 4500 });
        })
        .withFailureHandler(function(err) {
          if (window.M) M.toast({ html: 'Station passage email failed', classes: 'orange', displayLength: 5000 });
          console.error('sendDispatchEmail station passage failed', err);
        })
        .sendDispatchEmail({
          emails: _enrouteDispatchRecipients_(),
          subject: report.emailSubject,
          message: report.emailBody
        });
      return;
    }

    if (typeof window.flightAppConfirm === 'function') {
      const copyNow = await window.flightAppConfirm(
        `${report.popupText}\n\nOffline right now. Copy to Earthmate for InReach send?`,
        { title: 'Station Passage', okText: 'Copy To Earthmate' }
      );
      if (copyNow) {
        const copied = await _enrouteCopyText_(report.earthmateText);
        if (window.M) {
          M.toast({ html: copied ? 'Copied station passage for Earthmate' : 'Could not copy automatically', classes: copied ? 'green' : 'orange', displayLength: 5500 });
        }
      }
      return;
    }

    if (window.M) {
      M.toast({ html: report.popupText, classes: 'orange', displayLength: 6000 });
    }
  }

  function _updateDistanceSummary() {
    const el = document.getElementById('enroute-distance-summary');
    if (!el) return;
    const total = (window.enroute6.waypoints || []).reduce((sum, wp) => sum + (Number(wp && wp.distNm || 0) || 0), 0);
    el.textContent = `DIST ${Math.round(total)} nm`;
  }

  function _updateFuelSummary() {
    const el = document.getElementById('enroute-fuel-summary');
    if (!el) return;
    const f = window.enroute6.fuel || {};
    const total = Number(f.LM || 0) + Number(f.RM || 0) + Number(f.LT || 0) + Number(f.RT || 0);
    el.textContent = `FUEL ${Math.round(total)} L`;
  }

  window.recalcWaypointsFromGs = function() {
    if (!Array.isArray(window.enroute6.waypoints)) {
      window.enroute6.waypoints = [];
    }
    const gs = Number(window.enroute6.gsKts || 0);
    const now = new Date();
    let cumulativeMin = 0;

    window.enroute6.waypoints.forEach((wp, idx) => {
      const dist = Number(wp.distNm || 0);
      const ete = (gs > 0) ? Math.max(1, Math.round((dist / gs) * 60)) : 0;
      cumulativeMin += ete;
      const etaDate = new Date(now.getTime() + cumulativeMin * 60000);
      wp.eteMin = ete;
      wp.eta = gs > 0 ? _enrouteFmtHhmm(etaDate) : '--:--';
    });

    renderEnrouteWaypointRows();
    _enrouteRefreshRouteLayer();
    _updateDistanceSummary();
    _updateFuelSummary();
    updatePositionReportDraft();
  };

  function _bindLongPressDelete(rowEl, idx) {
    let timer = null;

    rowEl.addEventListener('mousedown', function() {
      timer = setTimeout(async function() {
        const wp = window.enroute6.waypoints[idx];
        const ok = await window.flightAppConfirm(`Delete waypoint ${wp.fix}?`, { title: 'Enroute Waypoint', okText: 'Delete' });
        if (ok) {
          window.enroute6.waypoints.splice(idx, 1);
          recalcWaypointsFromGs();
          if (window.M) M.toast({ html: `Removed ${wp.fix}`, classes: 'orange' });
        }
      }, 700);
    });

    rowEl.addEventListener('mouseup', function() {
      if (timer) clearTimeout(timer);
    });

    rowEl.addEventListener('mouseleave', function() {
      if (timer) clearTimeout(timer);
    });

    rowEl.addEventListener('touchstart', function() {
      timer = setTimeout(async function() {
        const wp = window.enroute6.waypoints[idx];
        const ok = await window.flightAppConfirm(`Delete waypoint ${wp.fix}?`, { title: 'Enroute Waypoint', okText: 'Delete' });
        if (ok) {
          window.enroute6.waypoints.splice(idx, 1);
          recalcWaypointsFromGs();
        }
      }, 700);
    }, { passive: true });

    rowEl.addEventListener('touchend', function() {
      if (timer) clearTimeout(timer);
    }, { passive: true });
  }

  window.markWaypointPassed = function(idx, options) {
    options = options || {};
    if (!window.enroute6.waypoints[idx]) return;
    const wasPassed = idx <= Number(window.enroute6.passedIndex || -1) || !!window.enroute6.waypoints[idx].passedAt;
    window.enroute6.passedIndex = Math.max(window.enroute6.passedIndex, idx);
    window.enroute6.waypoints[idx].passedAt = _enrouteFmtHhmm(new Date());
    if (Number(window.enroute6.directToTargetIdx) === idx) {
      window.enroute6.directToTargetIdx = null;
      window.enroute6.hideDirectToLine = true;
      if (window.enroute6.directToLayer) {
        window.enroute6.mapObj.removeLayer(window.enroute6.directToLayer);
        window.enroute6.directToLayer = null;
      }
      _enrouteRefreshRouteLayer();
    }
    renderEnrouteWaypointRows();
    _enrouteRefreshRouteLayer();
    _updateDistanceSummary();
    _updateFuelSummary();
    updatePositionReportDraft();
    if (!wasPassed) {
      _enrouteHandleStationPass_(idx);
      if (window.M) M.toast({ html: `✔ Passed ${window.enroute6.waypoints[idx].fix}`, classes: 'green', displayLength: 3500 });
    }
  };

  window.renderEnrouteWaypointRows = function() {
    const body = document.getElementById('enroute-wp-body');
    if (!body) return;

    const waypoints = Array.isArray(window.enroute6.waypoints) ? window.enroute6.waypoints : [];

    let html = '';
    for (let idx = 0; idx < waypoints.length; idx++) {
      const wp = waypoints[idx];
      const passed = idx <= window.enroute6.passedIndex;
      const bypassed = !passed && !!wp.bypassedAt;
      const isNext = idx === window.enroute6.passedIndex + 1;
      const canDelete = idx > 0 && idx < waypoints.length - 1;
      const legEte = wp.eteMin ? (wp.eteMin + 'm') : '--';
      const legClass = passed ? ' passed' : (bypassed ? ' bypassed' : '');
      const passedHtml = wp.passedAt
        ? ('<br><small>Passed ' + wp.passedAt + '</small>')
        : (wp.bypassedAt ? ('<br><small style="color:#bbb;">Bypassed ' + wp.bypassedAt + '</small>') : '');
      const passBtn = passed || bypassed ? '' : ('<button class="wp-pass-btn" onclick="markWaypointPassed(' + idx + ')">PASS</button>');
      const delBtn = (canDelete && !passed && !bypassed) ? ('<button class="wp-del-btn" onclick="deleteWaypoint(' + idx + ')">x</button>') : '';
      // DIRECT button: show for any waypoint ahead of next that has a known fix  
      const canDirect = !passed && !bypassed && idx > (window.enroute6.passedIndex + 1);
      const directBtn = canDirect ? ('<button class="wp-direct-btn" onclick="directToWaypoint(' + idx + ')">⇒ DIRECT</button>') : '';
      // SKIP button: show for the "next" waypoint only (manual waypoint advance)
      const skipBtn = isNext && !bypassed ? ('<button class="wp-pass-btn" onclick="markWaypointPassed(' + idx + ')" title="Skip to next waypoint" style="background:#7b1fa2;">SKIP</button>') : '';

      if (idx > 0) {
        html += '<tr class="wp-leg-row' + legClass + '">'
          + '<td style="padding-left:20px; font-style:italic;">LEG ' + idx + '</td>'
          + '<td class="hdg-cell"><b>' + (wp.hdg || '--') + '</b></td>'
          + '<td class="dist-cell"><b>' + Number(wp.distNm || 0) + 'nm</b></td>'
          + '<td><b>' + legEte + '</b></td>'
          + '<td colspan="4"></td>'
          + '</tr>';
      }

      html += '<tr class="wp-row' + legClass + '" data-wp-index="' + idx + '" draggable="' + canDelete + '">'
        + '<td><b>' + (wp.fix || '--') + '</b>' + passedHtml + '</td>'
        + '<td colspan="3"></td>'
        + '<td>' + (wp.eta || '--:--') + '</td>'
        + '<td style="font-size:0.65rem;">' + _enrouteFuelCellHtml_(idx, isNext) + '</td>'
        + '<td>' + (wp.fuelUsedL ? ('<span class="fuel-used-badge">' + Math.round(Number(wp.fuelUsedL || 0)) + 'L</span>') : '--') + '</td>'
        + '<td>' + (passed ? '' : (isNext ? skipBtn : (directBtn || passBtn))) + delBtn + '</td>'
        + '</tr>';
    }

    body.innerHTML = html || '<tr><td colspan="8" style="color:#888;">No waypoints loaded</td></tr>';

    const rows = body.querySelectorAll('.wp-row');
    rows.forEach((rowEl) => {
      const idx = Number(rowEl.dataset.wpIndex);
      
      rowEl.addEventListener('dragstart', function(e) {
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('text/plain', idx);
        this.style.opacity = '0.4';
      });
      
      rowEl.addEventListener('dragend', function() {
        this.style.opacity = '1';
      });
      
      rowEl.addEventListener('dragover', function(e) {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
        this.style.borderTop = '2px solid #0b5394';
      });
      
      rowEl.addEventListener('dragleave', function() {
        this.style.borderTop = '';
      });
      
      rowEl.addEventListener('drop', function(e) {
        e.preventDefault();
        this.style.borderTop = '';
        const fromIdx = Number(e.dataTransfer.getData('text/plain'));
        const toIdx = Number(this.dataset.wpIndex);
        if (fromIdx !== toIdx && fromIdx > 0 && toIdx > 0) {
          reorderWaypoint(fromIdx, toIdx);
        }
      });
    });
  };

  function renderFuelStrip() {
    _updateFuelSummary();
    _enrouteRenderTransferBanner_();
  }

  window.tapFuelTank = async function(tankName) {
    const f = window.enroute6.fuel;
    const transferActive = window.enroute6.transferActive || null;
    if (tankName === 'LM' || tankName === 'RM') {
      if (transferActive) {
        if (window.M) M.toast({ html: 'Stop the active tip transfer first', classes: 'orange' });
        return;
      }
      if (tankName === f.activeMain) {
        if (window.M) M.toast({ html: `${tankName} already active`, classes: 'blue-grey', displayLength: 1800 });
        return;
      }
      await window.switchMainTankPrompt(tankName);
      return;
    }

    if (transferActive && transferActive.tip === tankName) {
      await window.stopTipTransfer();
      return;
    }
    if (transferActive) {
      if (window.M) M.toast({ html: `Stop ${transferActive.tip} transfer first`, classes: 'orange' });
      return;
    }

    const side = tankName === 'LT' ? 'L' : 'R';
    startTipTransfer(side);
  };

  window.switchMainTankPrompt = async function(targetTank) {
    const f = window.enroute6.fuel;
    const from = f.activeMain;
    const to = targetTank === 'LM' || targetTank === 'RM' ? targetTank : (from === 'RM' ? 'LM' : 'RM');
    const ok = await window.flightAppConfirm(`Switch from ${from} to ${to}?`, { title: 'Main Tank Switch', okText: 'Switch Tank' });
    if (!ok) return;
    const burnedRaw = await window.flightAppPrompt(`Enter fuel burned from ${from} (L):`, '50', { title: 'Tank Switch', okText: 'Continue', inputType: 'number', inputMode: 'decimal', step: '1', min: '0' });
    if (burnedRaw == null) return;

    const burned = Math.max(0, Number(burnedRaw || 0));
    if (!isFinite(burned)) {
      if (window.M) M.toast({ html: 'Enter a valid fuel burn amount', classes: 'orange' });
      return;
    }

    f[from] = Math.max(0, Number(f[from] || 0) - burned);
    f.activeMain = to;
    const logEntry = _enrouteRecordFuelEvent_({ usedLiters: burned, note: `${from} to ${to} switch at ${_enrouteFmtHhmm(new Date())}` });
    if (logEntry && logEntry.wp) {
      logEntry.wp.activeMain = to;
    }
    if (window.M) M.toast({ html: `Active tank switched to ${to}`, classes: 'green', displayLength: 2400 });
    renderFuelStrip();
    recalcWaypointsFromGs();
  };

  window.startTipTransfer = function(side) {
    const f = window.enroute6.fuel;
    const tip = side === 'R' ? 'RT' : 'LT';
    const main = side === 'R' ? 'RM' : 'LM';
    const qty = Number(f[tip] || 0);
    const lpm = Math.max(0.1, Number(window.enroute6.transferRateLpm || 0.8));

    if (qty <= 0) {
      if (window.M) M.toast({ html: `${tip} has no fuel to transfer`, classes: 'orange' });
      return;
    }

    if (window.enroute6.transferTimer) {
      clearInterval(window.enroute6.transferTimer);
      window.enroute6.transferTimer = null;
    }

    window.enroute6.transferActive = {
      side: side,
      tip: tip,
      main: main,
      qtyAtStart: qty,
      startedAt: Date.now(),
      lpm: lpm
    };
    window.enroute6.transferSecondsLeft = 0;
    window.enroute6.lastTransferMessage = '';

    const tick = function() {
      const active = window.enroute6.transferActive;
      if (!active) return;
      window.enroute6.transferSecondsLeft = Math.max(0, Math.round((Date.now() - active.startedAt) / 1000));
      _enrouteRenderTransferBanner_();
    };

    tick();
    window.enroute6.transferTimer = setInterval(tick, 1000);
    renderFuelStrip();
    recalcWaypointsFromGs();
  };

  window.stopTipTransfer = async function() {
    const active = window.enroute6.transferActive || null;
    if (!active) return;
    if (window.enroute6.transferTimer) {
      clearInterval(window.enroute6.transferTimer);
      window.enroute6.transferTimer = null;
    }

    const f = window.enroute6.fuel;
    const elapsedSeconds = Math.max(0, Number(window.enroute6.transferSecondsLeft || 0));
    const suggested = Math.min(Number(active.qtyAtStart || 0), (elapsedSeconds / 60) * Math.max(0.1, Number(active.lpm || 0.8)));
    const defaultLiters = String(Math.max(0, Math.round(suggested)));
    const movedRaw = await window.flightAppPrompt(`How much fuel moved from ${active.tip} to ${active.main} (L)?`, defaultLiters, { title: 'Stop Tip Transfer', okText: 'Apply Fuel', inputType: 'number', inputMode: 'decimal', step: '1', min: '0' });
    if (movedRaw == null) {
      window.enroute6.transferTimer = setInterval(function() {
        const live = window.enroute6.transferActive;
        if (!live) return;
        window.enroute6.transferSecondsLeft = Math.max(0, Math.round((Date.now() - live.startedAt) / 1000));
        _enrouteRenderTransferBanner_();
      }, 1000);
      return;
    }

    const maxTransfer = Math.max(0, Number(f[active.tip] || 0));
    const moved = Math.min(maxTransfer, Math.max(0, Number(movedRaw || 0)));
    f[active.tip] = Math.max(0, Number(f[active.tip] || 0) - moved);
    f[active.main] = Math.max(0, Number(f[active.main] || 0) + moved);
    _enrouteRecordFuelEvent_({ note: `${active.tip} to ${active.main} transfer ${Math.round(moved)}L` });
    window.enroute6.lastTransferMessage = `${active.tip} transfer stopped. ${Math.round(moved)}L moved to ${active.main}.`;
    window.enroute6.transferActive = null;
    window.enroute6.transferSecondsLeft = 0;
    if (navigator.vibrate) navigator.vibrate([180, 120, 180]);
    if (window.M) M.toast({ html: window.enroute6.lastTransferMessage, classes: 'green', displayLength: 3200 });
    renderFuelStrip();
    recalcWaypointsFromGs();
  };

  function _buildWaypointSuggestions(query) {
    const q = String(query || '').trim().toUpperCase();
    if (!q) return [];

    const airports = (window.appData && Array.isArray(window.appData.airports)) ? window.appData.airports : [];
    const waypoints = (window.appData && Array.isArray(window.appData.waypoints)) ? window.appData.waypoints : [];

    const list = [];
    airports.forEach(a => {
      const fix = String(a.icao || '').toUpperCase();
      if (fix && fix.indexOf(q) >= 0) list.push({ fix: fix, type: 'APT' });
    });
    waypoints.forEach(w => {
      const fix = String(w.wp_id || '').toUpperCase();
      if (fix && fix.indexOf(q) >= 0) list.push({ fix: fix, type: 'WP' });
    });

    const seen = {};
    return list.filter(x => {
      if (seen[x.fix]) return false;
      seen[x.fix] = true;
      return true;
    }).slice(0, 10);
  }

  function renderSuggestionList(items) {
    const box = document.getElementById('enroute-suggest-list');
    if (!box) return;

    if (!items || !items.length) {
      box.style.display = 'none';
      box.innerHTML = '';
      return;
    }

    box.innerHTML = items.map(it => `<div class="suggest-item" onclick="pickWaypointSuggestion('${it.fix.replace(/'/g, "\\'")}')">${it.fix} <small style="color:#888;">${it.type}</small></div>`).join('');
    box.style.display = 'block';
  }

  window.pickWaypointSuggestion = function(fix) {
    const input = document.getElementById('enroute-add-fix');
    if (input) input.value = fix;
    renderSuggestionList([]);
  };

  window.addWaypointFromInput = function() {
    const input = document.getElementById('enroute-add-fix');
    const fix = String(input && input.value || '').trim().toUpperCase();
    if (!fix) {
      if (window.M) M.toast({ html: 'Enter waypoint code first', classes: 'orange' });
      return;
    }

    if (!window.enroute6 || !Array.isArray(window.enroute6.waypoints)) {
      window.enroute6 = window.enroute6 || {};
      window.enroute6.waypoints = [];
    }

    const isDuplicate = window.enroute6.waypoints.some(wp => String(wp.fix || '').toUpperCase() === fix);
    if (isDuplicate) {
      if (window.M) M.toast({ html: `${fix} already in route`, classes: 'orange' });
      return;
    }

    const insertIdx = Math.max(1, window.enroute6.waypoints.length - 1);
    window.enroute6.waypoints.splice(insertIdx, 0, {
      id: `${Date.now()}-${fix}`,
      fix: fix,
      distNm: 0,
      hdg: '--',
      eteMin: 0,
      eta: '--:--',
      passedAt: ''
    });

    if (input) input.value = '';
    renderSuggestionList([]);
    _enrouteDiag(`ADDED waypoint ${fix}`);
    _recalculateWaypointDistances(window.enroute6.waypoints);
    _calculateHeadings(window.enroute6.waypoints);
    recalcWaypointsFromGs();
    if (window.M) M.toast({ html: `Added ${fix}`, classes: 'green' });
  };

  window.deleteWaypoint = function(idx) {
    if (!window.enroute6 || !Array.isArray(window.enroute6.waypoints)) return;
    if (idx <= 0 || idx >= window.enroute6.waypoints.length - 1) return;

    const wp = window.enroute6.waypoints[idx];
    const finishDelete = function() {
      window.enroute6.waypoints.splice(idx, 1);
      if (window.enroute6.passedIndex >= idx) {
        window.enroute6.passedIndex = Math.max(-1, window.enroute6.passedIndex - 1);
      }
      _recalculateWaypointDistances(window.enroute6.waypoints);
      _calculateHeadings(window.enroute6.waypoints);
      recalcWaypointsFromGs();
      if (window.M) M.toast({ html: `Deleted ${wp.fix}`, classes: 'green' });
    };

    window.flightAppConfirm(`Delete waypoint ${wp.fix}?`, { title: 'Enroute Waypoint', okText: 'Delete' }).then(function(ok) {
      if (ok) finishDelete();
    });
  };

  window.reorderWaypoint = function(fromIdx, toIdx) {
    if (!window.enroute6 || !Array.isArray(window.enroute6.waypoints)) return;
    if (fromIdx === toIdx || fromIdx <= 0 || toIdx <= 0) return;
    if (fromIdx >= window.enroute6.waypoints.length - 1 || toIdx >= window.enroute6.waypoints.length) return;

    const waypoints = window.enroute6.waypoints;
    const wp = waypoints.splice(fromIdx, 1)[0];
    waypoints.splice(toIdx, 0, wp);

    _recalculateWaypointDistances(waypoints);
    _calculateHeadings(waypoints);
    recalcWaypointsFromGs();
    if (window.M) M.toast({ html: `Moved ${wp.fix}`, classes: 'green' });
  };

  function updatePositionReportDraft() {
    const holder = document.getElementById('enroute-comms-auto');
    if (!holder) return;

    const i = window.enroute6.passedIndex;
    const passed = i >= 0 ? window.enroute6.waypoints[i] : null;
    const next = window.enroute6.waypoints[i + 1] || window.enroute6.waypoints[0] || null;

    const passedText = passed
      ? `PASSED ${passed.fix} ${passed.passedAt || _enrouteFmtHhmm(new Date())}.`
      : 'ENROUTE.';
    const nextText = next
      ? ` ETA ${next.fix} ${next.eta || '--:--'}.`
      : ' ETA --.';

    holder.textContent = `${passedText}${nextText}`;
  }

  window.toggleEnrouteComms = function() {
    const panel = document.getElementById('enroute-comms-panel');
    if (!panel) return;
    panel.classList.toggle('open');
    updatePositionReportDraft();
  };

  window.sendPositionReport = function() {
    const auto = document.getElementById('enroute-comms-auto')?.textContent || '';
    const note = document.getElementById('enroute-comms-note')?.value || '';
    const msg = `${auto}${note ? ` Note: ${note}` : ''}`;

    const payload = {
      missionId: window.enroute6.missionId,
      flightLegId: window.enroute6.flightLegId,
      text: msg
    };

    if (typeof window.runOrQueueServerAction === 'function') {
      window.runOrQueueServerAction({
        method: 'sendEnroutePositionReport',
        args: [payload],
        label: 'Position report'
      }, {
        onSuccess: function() {
          if (window.M) M.toast({ html: 'Position report sent', classes: 'green' });
          toggleEnrouteComms();
          const noteEl = document.getElementById('enroute-comms-note');
          if (noteEl) noteEl.value = '';
        },
        onQueued: function() {
          if (window.M) M.toast({ html: 'Offline: position report queued', classes: 'orange' });
          toggleEnrouteComms();
          const noteEl = document.getElementById('enroute-comms-note');
          if (noteEl) noteEl.value = '';
        },
        onFailure: function(err) {
          if (window.M) M.toast({ html: 'Send failed', classes: 'red' });
          console.error('sendEnroutePositionReport failed', err);
        }
      });
      return;
    }

    if (!window.google || !google.script || !google.script.run) {
      console.log('SEND POSITION REPORT (local):', msg);
      toggleEnrouteComms();
      return;
    }

    const runSend = function(retryAttempted) {
      google.script.run
        .withSuccessHandler(function(resp) {
          if (window.M) M.toast({ html: 'Position report sent', classes: 'green' });
          toggleEnrouteComms();
          const noteEl = document.getElementById('enroute-comms-note');
          if (noteEl) noteEl.value = '';
        })
        .withFailureHandler(function(err) {
          if (!retryAttempted && _enrouteLikelyNetworkErr_(err)) {
            setTimeout(function() { runSend(true); }, 350);
            return;
          }
          if (window.M) M.toast({ html: 'Send failed', classes: 'red' });
          console.error('sendEnroutePositionReport failed', err);
        })
        .sendEnroutePositionReport(payload);
    };

    runSend(false);
  };

  window.openTraccarMapPopup = function() {
    centerEnrouteMap();
  };

  window.closeTraccarMapPopup = function() {};

  window.__setupEnrouteTabImpl = function(mission) {
    if (!mission || !mission.legs || !mission.legs.length) return;

    const firstLeg = mission.legs[0] || {};
    const flightLegId = firstLeg.flightLegId || '';
    const acft = String(mission.acft || '').trim().toUpperCase();
    const acftObj = (window.appData && Array.isArray(window.appData.aircraft))
      ? window.appData.aircraft.find(a => String(a.reg || '').trim().toUpperCase() === acft)
      : null;

    const transferRate = Number(acftObj && acftObj.TRANSFER_RATE_LPM || 0.8);
    const launchFuel = Number(firstLeg.takeoffFuel || 0);
    const mainStart = launchFuel > 0 ? Math.round(launchFuel / 2) : 120;
    const tipCap = Math.round(Number(acftObj && acftObj.TIP_CAPACITY_L || 0) || 0);

    const _totalFuel = function(f) {
      if (!f) return 0;
      return Number(f.LT || 0) + Number(f.LM || 0) + Number(f.RM || 0) + Number(f.RT || 0);
    };

    const _fuelFromBriefSnapshot = function() {
      const snap = window.briefFuelSnapshot || null;
      if (!snap) return null;
      const seeded = {
        LT: Number(snap.LT || 0),
        LM: Number(snap.LM || 0),
        RM: Number(snap.RM || 0),
        RT: Number(snap.RT || 0),
        activeMain: (String(snap.activeMain || '').trim().toUpperCase() === 'LM' ? 'LM' : 'RM')
      };
      return _totalFuel(seeded) > 0 ? seeded : null;
    };

    const _applyActiveMainPreference = function(fuelState) {
      const seeded = fuelState ? { ...fuelState } : null;
      if (!seeded) return seeded;
      const briefSnap = _fuelFromBriefSnapshot();
      if (briefSnap && (briefSnap.activeMain === 'LM' || briefSnap.activeMain === 'RM')) {
        seeded.activeMain = briefSnap.activeMain;
      } else if (String(seeded.activeMain || '').trim().toUpperCase() !== 'LM') {
        seeded.activeMain = 'RM';
      }
      return seeded;
    };

    const initializeEnroute = function(actualFuel, routeData) {
      window.enroute6 = {
        ...window.enroute6,
        missionId: mission.id || '',
        flightLegId: flightLegId,
        waypoints: _buildInitialWaypoints(routeData),
        passedIndex: -1,
        hideDirectToLine: false,
        transferRateLpm: transferRate > 0 ? transferRate : 0.8,
        fuel: _applyActiveMainPreference(_totalFuel(actualFuel) > 0 ? actualFuel : (_fuelFromBriefSnapshot() || {
          LT: tipCap,
          LM: mainStart,
          RM: mainStart,
          RT: tipCap,
          activeMain: 'RM'
        }))
      };

      const endpointEl = document.getElementById('enroute-api-endpoint');
      const storedTemplate = String(localStorage.getItem('enrouteTileTemplate') || '');
      window.enroute6.tileTemplate = storedTemplate || _enrouteDefaultTileTemplate();

      // Restore threshold settings
      const storedAutoPass = Number(localStorage.getItem('enrouteAutoPassNm') || 0);
      if (storedAutoPass > 0) {
        window.enroute6.autoPassThresholdNm = storedAutoPass;
        const apEl = document.getElementById('enroute-autopass-nm');
        if (apEl) apEl.value = storedAutoPass;
      }

      if (endpointEl && !endpointEl.value) {
        endpointEl.value = String(localStorage.getItem('traccarEndpoint') || '');
      }

      const addInput = document.getElementById('enroute-add-fix');
      if (addInput && addInput.dataset.bound !== '1') {
        addInput.addEventListener('input', function() {
          renderSuggestionList(_buildWaypointSuggestions(this.value));
        });
        addInput.addEventListener('keydown', function(e) {
          if (e.key === 'Enter') addWaypointFromInput();
        });
        addInput.dataset.bound = '1';
      }

      renderFuelStrip();
      recalcWaypointsFromGs();
      _updatePackStatus();
      _enrouteInitMap();
      setTimeout(function() { _enrouteInvalidateMapSize_(true); }, 220);
      // Load offline tile layer if a valid non-expired pack exists
      try {
        const _pm = JSON.parse(localStorage.getItem('enrouteMapPackMeta') || 'null');
        if (_pm && _pm.tileCount > 0) {
          const _ageDays = (Date.now() - new Date(_pm.savedAt).getTime()) / 86400000;
          if (_ageDays < 28) {
            _enrouteEnsureLeaflet(function() { _enrouteApplyOfflineTileLayer(); });
            _enrouteDiag('Offline tile pack loaded (' + _pm.tileCount + ' tiles, ' + Math.round(_ageDays) + 'd old)');
          }
        }
      } catch(e) {}
      _enrouteUpdateHeader();
      _enrouteUpdateRollUi_();
      _updateDistanceSummary();
      _updateFuelSummary();
      startGpsTracking();
    };

    if (flightLegId && window.google && google.script && google.script.run) {
      let actualFuel = null;
      let routeData = null;
      let loadPending = 2;

      const checkComplete = function() {
        loadPending--;
        if (loadPending === 0) {
          if (!routeData) {
            routeData = {
              from: firstLeg.from || '',
              to: firstLeg.to || '',
              waypoints: firstLeg.waypoints || []
            };
          }
          initializeEnroute(actualFuel, routeData);
        }
      };

      const loadFlightLogData = function(retryAttempted) {
        google.script.run
          .withSuccessHandler(function(logData) {
            if (logData && logData.actualLoadJSON) {
              try {
                const parsed = JSON.parse(logData.actualLoadJSON);
                if (parsed && parsed.tanks) {
                  actualFuel = {
                    LT: Number(parsed.tanks.LT || 0),
                    LM: Number(parsed.tanks.LM || 0),
                    RM: Number(parsed.tanks.RM || 0),
                    RT: Number(parsed.tanks.RT || 0),
                    activeMain: (String(parsed.activeMain || parsed.tanks.activeMain || '').trim().toUpperCase() === 'LM' ? 'LM' : 'RM')
                  };
                }
              } catch (e) {
                console.warn('Failed to parse actualLoadJSON:', e);
              }
            }
            checkComplete();
          })
          .withFailureHandler(function(err) {
            if (!retryAttempted && _enrouteLikelyNetworkErr_(err)) {
              setTimeout(function() { loadFlightLogData(true); }, 350);
              return;
            }
            console.warn('Failed to fetch LOG_Flights data:', err);
            checkComplete();
          })
          .getFlightLogData(flightLegId);
      };

      const loadFlightRouteData = function(retryAttempted) {
        google.script.run
          .withSuccessHandler(function(data) {
            if (data) {
              routeData = data;
            }
            checkComplete();
          })
          .withFailureHandler(function(err) {
            if (!retryAttempted && _enrouteLikelyNetworkErr_(err)) {
              setTimeout(function() { loadFlightRouteData(true); }, 350);
              return;
            }
            console.warn('Failed to fetch route data:', err);
            checkComplete();
          })
          .getFlightRouteData(flightLegId);
      };

      loadFlightLogData(false);
      loadFlightRouteData(false);
    } else {
      const fallbackRoute = {
        from: firstLeg.from || '',
        to: firstLeg.to || '',
        waypoints: firstLeg.waypoints || []
      };
      initializeEnroute(null, fallbackRoute);
    }
  };

  window.setupEnrouteTab = window.__setupEnrouteTabImpl;

  window.__enrouteScriptReady = true;

</script>
