<div id="debrief-container"></div>

<script>
window.debrief8 = {
  mission: null,
  activeLeg: null,
  flightLegId: null,
  startTach: '',
  fuelStart: 0,
  traccarData: null,
  logData: null
};

const DEBR8_ENABLE_CLICK_VERIFY = true;

function _debr8FindActiveLeg_(mission) {
  const legs = Array.isArray(mission && mission.legs) ? mission.legs : [];
  if (!legs.length) return null;
  const activeId = String(window.activeLegFlightId || '').trim();
  if (activeId) {
    const found = legs.find(function(l) {
      return [l && l.flightLegId, l && l.flight_id, l && l.id].some(function(v) {
        return String(v || '').trim() === activeId;
      });
    });
    if (found) return found;
  }
  const mostRecentTouched = legs
    .map(function(leg) {
      const stamps = [
        leg && leg.onBlocks,
        leg && leg.brakesApplied,
        leg && leg.bracesRelease,
        leg && leg.brakesRelease,
        leg && leg.brakesAppliedTime,
        leg && leg.brakesReleaseTime
      ].map(function(v) {
        const ts = new Date(v || '').getTime();
        return isNaN(ts) ? 0 : ts;
      });
      return { leg: leg, stamp: Math.max.apply(null, stamps) };
    })
    .sort(function(a, b) { return b.stamp - a.stamp; })[0];
  if (mostRecentTouched && mostRecentTouched.stamp > 0) return mostRecentTouched.leg;
  const pending = legs.find(function(l) { return String(l && l.logStatus || 'PENDING') !== 'COMPLETE'; });
  return pending || legs[legs.length - 1] || legs[0];
}

function _debr8ReadCachedMission_(mission) {
  // NOTE: PilotApp caches as 'mba_cache_mission_XXX'; Tabs 5/7 write to 'mission_XXX'.
  // The in-memory mission passed here already has Tab 5/7 updates applied live,
  // so prefer it over any disk cache. We only upgrade from cache if the passed
  // mission is missing the leg timing data AND a cache copy has it.
  try {
    const missionId = String((mission && mission.id) || '').trim();
    if (!missionId) return mission;
    const _hasTimings = function(m) {
      if (!Array.isArray(m && m.legs)) return false;
      return m.legs.some(function(l) { return l && (l.bracesRelease || l.brakesRelease || l.onBlocks || l.airborne || l.airborneTime); });
    };
    if (_hasTimings(mission)) return mission;
    // In-memory mission lacks timings — check both cache key formats
    var cached = null;
    try { cached = JSON.parse(localStorage.getItem('mission_' + missionId) || 'null'); } catch (e) {}
    if (cached && Array.isArray(cached.legs) && _hasTimings(cached)) return cached;
    try { cached = JSON.parse(localStorage.getItem('mba_cache_mission_' + missionId) || 'null'); } catch (e) {}
    if (cached && Array.isArray(cached.legs) && _hasTimings(cached)) return cached;
    return mission;
  } catch (e) {
    return mission;
  }
}

function _debr8NormTime_(v) {
  const raw = String(v || '').trim();
  if (!raw) return '';
  
  const m = raw.match(/(\d{1,2}):(\d{2})(?::(\d{2}))?/);
  if (m) {
    const hh = String(Math.max(0, Math.min(23, Number(m[1] || 0)))).padStart(2, '0');
    const mm = String(Math.max(0, Math.min(59, Number(m[2] || 0)))).padStart(2, '0');
    return `${hh}:${mm}`;
  }
  
  const d = new Date(raw);
  if (!isNaN(d.getTime())) {
    // Debrief ops are in BSB local time; avoid UTC shifts that inflate leg durations.
    const parts = new Intl.DateTimeFormat('en-GB', {
      timeZone: 'America/Sao_Paulo',
      hour12: false,
      hour: '2-digit',
      minute: '2-digit'
    }).formatToParts(d);
    const hh = String((parts.find(function(p) { return p.type === 'hour'; }) || {}).value || '00').padStart(2, '0');
    const mm = String((parts.find(function(p) { return p.type === 'minute'; }) || {}).value || '00').padStart(2, '0');
    return `${hh}:${mm}`;
  }
  return raw;
}

function _debr8ResolveStartTach_(mission, leg, logData) {
  const fromLog = String((logData && logData.startTach) || '').trim();
  if (fromLog) return fromLog;

  const fromLeg = String((leg && leg.startTach) || '').trim();
  if (fromLeg) return fromLeg;

  const fromMission = String((mission && mission.startTach) || '').trim();
  if (fromMission) return fromMission;

  const fromTab2Input = String(document.getElementById('brief_startTach')?.value || '').trim();
  if (fromTab2Input) return fromTab2Input;

  try {
    const missionId = String((mission && mission.id) || '').trim();
    if (missionId) {
      const cached = JSON.parse(localStorage.getItem('mission_' + missionId) || 'null');
      const cachedLegs = Array.isArray(cached && cached.legs) ? cached.legs : [];
      const flightLegId = String((leg && leg.flightLegId) || '').trim();
      const cachedLeg = cachedLegs.find(function(l) { return String(l && l.flightLegId || '').trim() === flightLegId; });
      const fromCache = String((cachedLeg && cachedLeg.startTach) || '').trim();
      if (fromCache) return fromCache;
    }
  } catch (e) {}

  return '';
}

function _debr8ResolveFuelStart_(mission, leg, logData) {
  const fromTab2Tanks = (function() {
    try {
      const tankInputs = Array.from(document.querySelectorAll('.brief-tank-input'));
      if (!tankInputs.length) return NaN;
      const total = tankInputs.reduce(function(sum, el) {
        return sum + (parseFloat(el && el.value) || 0);
      }, 0);
      return total > 0 ? total : NaN;
    } catch (e) {
      return NaN;
    }
  })();

  if (isFinite(fromTab2Tanks)) return Math.round(fromTab2Tanks);

  const fromActualLoad = (function() {
    const raw = (logData && logData.actualLoadJSON) || (leg && leg.actualLoadJSON) || '';
    if (!raw) return NaN;
    try {
      const parsed = (typeof raw === 'string') ? JSON.parse(raw) : raw;
      const v = Number(parsed && parsed.fuelTotal);
      return isFinite(v) && v > 0 ? v : NaN;
    } catch (e) {
      return NaN;
    }
  })();

  if (isFinite(fromActualLoad)) return Math.round(fromActualLoad);

  const fromLog = Number(logData && logData.fuelStart);
  if (isFinite(fromLog) && fromLog > 0) return Math.round(fromLog);

  const fromLeg = Number(leg && leg.takeoffFuel);
  if (isFinite(fromLeg) && fromLeg > 0) return Math.round(fromLeg);

  return 0;
}

function _debr8Esc_(v) {
  return String(v || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function _debr8SquawkList_(raw) {
  const items = String(raw || '')
    .split(/[\n,;]+/)
    .map(function(s) { return String(s || '').trim(); })
    .filter(Boolean);
  return items.length ? items : [''];
}

function _debr8RenderSquawkRows_(items) {
  const container = document.getElementById('debr8-squawk-list');
  if (!container) return;
  const rows = (Array.isArray(items) && items.length ? items : ['']).map(function(item, idx) {
    return `
      <div class="debr8-squawk-row">
        <input class="debr8-squawk-input" type="text" value="${_debr8Esc_(item)}" placeholder="Describe discrepancy ${idx + 1}">
        <button class="debr8-squawk-btn remove" type="button" title="Remove" onclick="window.debr8RemoveSquawkRow(this)">−</button>
      </div>
    `;
  });
  container.innerHTML = rows.join('');
}

window.debr8AddSquawkRow = function() {
  const container = document.getElementById('debr8-squawk-list');
  if (!container) return;
  const row = document.createElement('div');
  row.className = 'debr8-squawk-row';
  row.innerHTML = `
    <input class="debr8-squawk-input" type="text" value="" placeholder="Describe discrepancy">
    <button class="debr8-squawk-btn remove" type="button" title="Remove" onclick="window.debr8RemoveSquawkRow(this)">−</button>
  `;
  container.appendChild(row);
  const input = row.querySelector('.debr8-squawk-input');
  if (input) input.focus();
};

window.debr8RemoveSquawkRow = function(btn) {
  const row = btn && btn.closest ? btn.closest('.debr8-squawk-row') : null;
  if (!row) return;
  const container = document.getElementById('debr8-squawk-list');
  if (!container) return;
  const allRows = container.querySelectorAll('.debr8-squawk-row');
  if (allRows.length <= 1) {
    const input = row.querySelector('.debr8-squawk-input');
    if (input) input.value = '';
    return;
  }
  row.remove();
}

function _debr8SquawksToTextarea_(raw) {
  return String(raw || '')
    .split(/[\n,;]+/)
    .map(function(s) { return String(s || '').trim(); })
    .filter(Boolean)
    .join('\n');
}

function _debr8IsTrainingMission_(mission, leg) {
  const missionType = String((mission && mission.meta && mission.meta.type) || '').toUpperCase();
  if (missionType.indexOf('TRAIN') >= 0) return true;
  const trainingCode = String((leg && leg.training && leg.training.code) || '').trim();
  return !!trainingCode;
}

function _debr8SplitRunwayCheckout_(raw) {
  return String(raw || '')
    .toUpperCase()
    .split(/[;,]+/)
    .map(function(s) { return String(s || '').trim(); })
    .filter(Boolean);
}

function _debr8ResolveTimelineTime_() {
  for (let i = 0; i < arguments.length; i++) {
    const raw = arguments[i];
    if (raw == null) continue;
    const text = String(raw).trim();
    if (!text) continue;
    const normalized = _debr8NormTime_(raw);
    if (String(normalized || '').trim()) return normalized;
  }
  return '';
}

function _debr8Render_(mission, leg, logData) {
  window.debrief8.mission = mission;
  window.debrief8.activeLeg = leg;
  window.debrief8.flightLegId = String(
    (leg && (leg.flightLegId || leg.flight_id || leg.id)) ||
    window.activeLegFlightId ||
    (mission && mission.activeLegFlightId) ||
    mission.id ||
    ''
  );
  window.debrief8.startTach = _debr8ResolveStartTach_(mission, leg, logData);
  window.debrief8.fuelStart = _debr8ResolveFuelStart_(mission, leg, logData);
  window.debrief8.logData = logData || null;
  const actualLoad = (function(raw) {
    try {
      return raw ? JSON.parse(String(raw)) : {};
    } catch (e) {
      return {};
    }
  })((logData && logData.actualLoadJSON) || '');
  const savedDebrief = (actualLoad && actualLoad.debrief) || {};

  window.debrief8.traccarData = {
    brakesRelease: _debr8ResolveTimelineTime_(
      logData && logData.brakesRelease,
      leg?.brakesRelease,
      leg?.bracesRelease,
      leg?.brakesReleaseTime,
      leg?.released,
      mission?.brakesRelease
    ),
    airborne: _debr8ResolveTimelineTime_(
      logData && logData.airborne,
      leg?.airborne,
      leg?.airborneTime,
      mission?.airborne
    ),
    landed: _debr8ResolveTimelineTime_(
      logData && logData.landed,
      leg?.landed,
      leg?.landedTime,
      leg?.onBlocks,
      leg?.brakesApplied,
      mission?.landed
    ),
    onBlocks: _debr8ResolveTimelineTime_(
      logData && logData.onBlocks,
      logData && logData.brakesApplied,
      leg?.onBlocks,
      leg?.brakesApplied,
      leg?.brakesAppliedTime,
      mission?.onBlocks
    ),
    numLdgs: Number((logData && logData.numLdgs) || leg?.numLdgs || 1) || 1,
    numTouchAndGos: Number((logData && logData.numTouchAndGos) || leg?.numTouchAndGos || savedDebrief.numTouchAndGos || 0) || 0,
    nightLdgs: Number(savedDebrief.nightLdgs || leg?.nightLdgs || 0) || 0,
    nightHrs: Number(savedDebrief.nightHrs || leg?.nightHrs || 0) || 0,
    ifrHrs: Number(savedDebrief.ifrHrs || leg?.ifrHrs || 0) || 0,
    dualRecvd: Number(savedDebrief.dualRecvd || leg?.dualRecvd || 0) || 0,
    dualGiven: Number(savedDebrief.dualGiven || leg?.dualGiven || 0) || 0
  };
  window.debrief8.timelineVerify = {
    brakesRelease: false,
    airborne: false,

window.setupDebriefTab = function(mission) {
  mission = _debr8ReadCachedMission_(mission);
  if (!mission || !mission.legs || mission.legs.length === 0) {
    document.getElementById('debrief-container').innerHTML = "<p style='padding:20px; color:red;'>No mission data found.</p>";
    return;
  }

  const leg = _debr8FindActiveLeg_(mission);
  if (!leg) {
    document.getElementById('debrief-container').innerHTML = "<p style='padding:20px; color:red;'>No active leg found.</p>";
    return;
  }

  const flightLegId = String(
    (leg && (leg.flightLegId || leg.flight_id || leg.id)) ||
    window.activeLegFlightId ||
    (mission && mission.activeLegFlightId) ||
    mission.id ||
    ''
  );
  if (window.google && google.script && google.script.run) {
    google.script.run
      .withSuccessHandler(function(logData) {
        _debr8Render_(mission, leg, logData || null);
      })
      .withFailureHandler(function() {
        _debr8Render_(mission, leg, null);
      })
      .getFlightLogData(flightLegId);
    return;
  }

  _debr8Render_(mission, leg, null);
};

window.calculateFuelUsed = function() {
  const fuelEndEl = document.getElementById('debr8_fuelEnd');
  const fuelEndVal = fuelEndEl?.value?.trim();
  if (!fuelEndVal) {
    document.getElementById('debr8_fuelUsed').innerText = '—';
    return;
  }
  const fuelEnd = parseFloat(fuelEndVal) || 0;
  const fuelStart = window.debrief8.fuelStart || 0;
  const fuelUsed = Math.max(0, fuelStart - fuelEnd);
  document.getElementById('debr8_fuelUsed').innerText = `${Math.round(fuelUsed)} L`;
};

window.debr8OpenNumeric_ = function(inputId, label, opts) {
  const input = document.getElementById(inputId);
  if (!input) return;
  const o = opts || {};
  const timeMode = !!o.timeMode;

  if (typeof window.briefOpenKeypad_ === 'function' && document.getElementById('brief-keypad-modal')) {
    window.briefOpenKeypad_(input, label || 'Entry', {
      decimal: timeMode ? false : !!o.decimal,
      maxLen: Number(o.maxLen || 8),
      onApply: function() {
        if (timeMode) window.debr8FormatTimeInput_(inputId);
        if (typeof o.onApply === 'function') o.onApply();
      }
    });
    return;
  }

  if (typeof window.flightDeckOpenNumericKeypad === 'function' && document.getElementById('perf-popup-backdrop')) {
    window.flightDeckOpenNumericKeypad(inputId, {
      title: label || 'Numeric Input',
      allowSign: false,
      clearOnOpen: false,
      onCommit: function() {
        if (timeMode) window.debr8FormatTimeInput_(inputId);
        if (typeof o.onApply === 'function') o.onApply();
      }
    });
    return;
  }

  input.readOnly = false;
  input.focus();
};

window.debr8FormatTimeInput_ = function(inputId) {
  var input = document.getElementById(inputId);
  if (!input) return;
  var val = String(input.value || '').trim();
  var digits = val.replace(/\D/g, '');
  if (digits.length === 3) digits = '0' + digits;
  if (digits.length === 4) {
    var h = digits.substring(0, 2);
    var m = digits.substring(2, 4);
    h = String(Math.max(0, Math.min(23, Number(h)))).padStart(2, '0');
    m = String(Math.max(0, Math.min(59, Number(m)))).padStart(2, '0');
    input.value = h + ':' + m;
  }
};

function _debr8TimelineKeys_() {
  return ['brakesRelease', 'airborne', 'landed', 'onBlocks', 'nightLdgs', 'nightHrs', 'ifrHrs', 'dualRecvd', 'dualGiven'];
}

function _debr8TimelineMeta_(key) {
  const map = {
    brakesRelease: { boxId: 'debr8_brakesReleaseBox', inputId: 'debr8_brakesReleaseInput', displayId: 'debr8_brakesRelease', label: 'BRAKES RELEASE', opts: { timeMode: true, maxLen: 4 } },
    airborne: { boxId: 'debr8_airborneBox', inputId: 'debr8_airborne', displayId: 'debr8_airborneDisplay', label: 'AIRBORNE', opts: { timeMode: true, maxLen: 4 } },
    landed: { boxId: 'debr8_landedBox', inputId: 'debr8_landed', displayId: 'debr8_landedDisplay', label: 'LANDED', opts: { timeMode: true, maxLen: 4 } },
    onBlocks: { boxId: 'debr8_onBlocksBox', inputId: 'debr8_onBlocks', displayId: 'debr8_onBlocksDisplay', label: 'ON BLOCKS', opts: { timeMode: true, maxLen: 4 } },
    nightLdgs: { boxId: 'debr8_nightLdgsBox', inputId: 'debr8_nightLdgs', displayId: 'debr8_nightLdgsDisplay', label: 'NIGHT LANDINGS', opts: { decimal: false, maxLen: 3 } },
    nightHrs: { boxId: 'debr8_nightHrsBox', inputId: 'debr8_nightHrs', displayId: 'debr8_nightHrsDisplay', label: 'NIGHT HOURS', opts: { decimal: true, maxLen: 4 } },
    ifrHrs: { boxId: 'debr8_ifrHrsBox', inputId: 'debr8_ifrHrs', displayId: 'debr8_ifrHrsDisplay', label: 'IFR HOURS', opts: { decimal: true, maxLen: 4 } },
    dualRecvd: { boxId: 'debr8_dualRecvdBox', inputId: 'debr8_dualRecvd', displayId: 'debr8_dualRecvdDisplay', label: 'DUAL RECVD (STUDENT)', opts: { decimal: true, maxLen: 4 } },
    dualGiven: { boxId: 'debr8_dualGivenBox', inputId: 'debr8_dualGiven', displayId: 'debr8_dualGivenDisplay', label: 'DUAL GIVEN (INSTRUCTOR)', opts: { decimal: true, maxLen: 4 } }
  };
  return map[key] || null;
}

function _debr8TimelineRawValue_(key) {
  const meta = _debr8TimelineMeta_(key);
  if (!meta) return '';
  const input = document.getElementById(meta.inputId);
  const display = document.getElementById(meta.displayId);
  const inputVal = String(input && input.value || '').trim();
  if (inputVal) return inputVal;
  const cacheVal = String(window.debrief8 && window.debrief8.traccarData && window.debrief8.traccarData[key] || '').trim();
  if (cacheVal) return cacheVal;
  const displayVal = String(display && display.textContent || '').trim();
  if (displayVal && displayVal !== '—') return displayVal;
  return '';
}

function _debr8TimelineHasValue_(key) {
  const meta = _debr8TimelineMeta_(key);
  if (!meta) return false;
  const raw = _debr8TimelineRawValue_(key);
  if (!raw) return false;
  if (meta.opts && meta.opts.timeMode) return /^(\d{2}):(\d{2})$/.test(_debr8NormTime_(raw));
  return true;
}

window.debr8SyncTimelineField_ = function(key) {
  const meta = _debr8TimelineMeta_(key);
  if (!meta) return;
  const input = document.getElementById(meta.inputId);
  const display = document.getElementById(meta.displayId);
  if (!input || !display) return;
  let value = _debr8TimelineRawValue_(key);
  if (meta.opts && meta.opts.timeMode) value = _debr8NormTime_(value);
  input.value = value;
  display.textContent = value || '—';
  if (window.debrief8 && window.debrief8.traccarData) window.debrief8.traccarData[key] = value;
};

window.debr8SetTimelineVerified_ = function(key, verified) {
  const meta = _debr8TimelineMeta_(key);
  if (!meta) return;
  window.debrief8.timelineVerify = window.debrief8.timelineVerify || {};
  window.debrief8.timelineVerify[key] = !!verified;
  const box = document.getElementById(meta.boxId);
  if (box) box.classList.toggle('verified', !!verified);
};

window.debr8OpenTimelineEditor_ = function(key) {
  const meta = _debr8TimelineMeta_(key);
  if (!meta) return;
  window.debr8SetTimelineVerified_(key, false);
  window.debr8OpenNumeric_(meta.inputId, meta.label, Object.assign({}, meta.opts, {
    onApply: function() {
      window.debr8SyncTimelineField_(key);
      window.debr8SetTimelineVerified_(key, true);
    }
  }));
};

window.debr8TimelineTap_ = function(key) {
  if (!DEBR8_ENABLE_CLICK_VERIFY) return;
  const meta = _debr8TimelineMeta_(key);
  if (!meta) return;
  const taps = window.debrief8.timelineTapState = window.debrief8.timelineTapState || {};
  const pending = taps[key];
  if (pending) {
    clearTimeout(pending.timer);
    delete taps[key];
    window.debr8OpenTimelineEditor_(key);
    return;
  }

  taps[key] = {
    timer: setTimeout(function() {
      delete taps[key];
      window.debr8SyncTimelineField_(key);
      if (!_debr8TimelineHasValue_(key)) {
        if (window.M) M.toast({ html: 'No value yet — double tap to enter it', classes: 'orange' });
        return;
      }
      window.debr8SetTimelineVerified_(key, true);
    }, 220)
  };
};

function _debr8AllChecksValid_() {
  if (!DEBR8_ENABLE_CLICK_VERIFY) return true;
  var tv = window.debrief8 && window.debrief8.timelineVerify;
  if (!tv) return false;
  var timelineOk = _debr8TimelineKeys_().every(function(key) {
    return !!tv[key] && _debr8TimelineHasValue_(key);
  });
  return timelineOk && !!window.debrief8.landingLogVerified;
}

function _debr8RenderLandingLog_() {
  var list = window.debrief8.landingLog || [];
  var container = document.getElementById('debr8-landing-log-list');
  var countsEl = document.getElementById('debr8-ldg-counts');
  if (!container) return;

  if (!list.length) {
    container.innerHTML = '<p class="debrief-note" style="margin:6px 0;">No landings logged yet.</p>';
  } else {
    container.innerHTML = list.map(function(entry, idx) {
      var isTng = String(entry.type || '').toUpperCase() === 'TNG';
      var typeLabel = isTng ? 'Touch &amp; Go' : 'Full Landing';
      var loc = _debr8Esc_(entry.icao || entry.locDesc || '—');
      var name = entry.name ? (' &mdash; ' + _debr8Esc_(entry.name)) : '';
      var timeStr = entry.timeZ ? (_debr8Esc_(entry.timeZ) + 'Z') : '—';
      return '<div class="debr8-landing-row' + (isTng ? ' tng' : '') + '">'
        + '<span class="debr8-landing-seq">#' + (idx + 1) + '</span>'
        + '<div class="debr8-landing-info">'
        + '<span class="debr8-landing-type">' + typeLabel + '</span>'
        + ' <b>' + loc + '</b>' + name
        + '<br><span style="font-size:0.8rem;color:#607d8b;">Detected ' + timeStr + '</span>'
        + '</div>'
        + '<button class="debr8-landing-del" type="button" title="Delete" onclick="window.debr8DeleteLanding_(' + idx + ')">&#8722;</button>'
        + '</div>';
    }).join('');
  }

  if (countsEl) {
    var totalLdgs = list.length;
    var tngCount = list.filter(function(e) { return String(e.type || '').toUpperCase() === 'TNG'; }).length;
    var fullCount = totalLdgs - tngCount;
    countsEl.textContent = totalLdgs
      ? ('Total: ' + totalLdgs + ' landing' + (totalLdgs !== 1 ? 's' : '') + '  ·  ' + fullCount + ' full  ·  ' + tngCount + ' T&G')
      : '';
  }

  var verifyBtn = document.getElementById('debr8-ldg-verify-btn');
  if (verifyBtn) {
    var isVerified = !!(window.debrief8.landingLogVerified);
    verifyBtn.className = 'debr8-ldg-btn ' + (isVerified ? 'verified' : 'verify');
    verifyBtn.textContent = isVerified ? '\u2713 Verified' : '\u2713 Verify';
  }
}

window.debr8DeleteLanding_ = function(idx) {

    + '<div class="debr8-add-ldg-field">'
    + '<label>Landing Type</label>'
    + '<select id="debr8-ldg-type-in" class="debr8-add-ldg-select">'
    + '<option value="FULL">Full Landing</option>'
    + '<option value="TNG">Touch and Go</option>'
    + '</select>'
    + '</div>'
    + '<div class="debr8-add-ldg-footer">'
    + '<button class="debr8-ldg-btn add" type="button" onclick="window.debr8AddLandingConfirm_()">Add Landing</button>'
    + '<button class="debr8-ldg-btn" style="background:#9e9e9e;color:white;" type="button" onclick="window.debr8AddLandingCancel_()">Cancel</button>'
    + '</div>'
    + '</div>';
  document.body.appendChild(overlay);

  var airportInput = document.getElementById('debr8-ldg-airport-in');
  var suggestEl = document.getElementById('debr8-ldg-suggest-list');
  airportInput.addEventListener('input', function() {
    var q = String(this.value || '').trim().toUpperCase();
    if (q.length < 2) { suggestEl.style.display = 'none'; return; }
    var airports = (window.appData && Array.isArray(window.appData.airports)) ? window.appData.airports : [];
    var matches = airports.filter(function(a) {
      var code = String(a && (a.icao || a.code || a.iata) || '').toUpperCase();
      var name = String(a && (a.name || a.city) || '').toUpperCase();
      return code.indexOf(q) >= 0 || name.indexOf(q) >= 0;
    }).slice(0, 8);
    if (!matches.length) { suggestEl.style.display = 'none'; return; }
    suggestEl.style.display = 'block';
    suggestEl.innerHTML = matches.map(function(a) {
      var code = String(a && (a.icao || a.code || a.iata) || '').toUpperCase();
      var name = String(a && (a.name || a.city) || '');
      return '<div class="debr8-ldg-suggest-item" data-code="' + _debr8Esc_(code) + '" data-name="' + _debr8Esc_(name) + '">'
        + '<b>' + _debr8Esc_(code) + '</b> \u2014 ' + _debr8Esc_(name)
        + '</div>';
    }).join('');
    suggestEl.querySelectorAll('.debr8-ldg-suggest-item').forEach(function(item) {
      item.addEventListener('click', function() {
        airportInput.dataset.selectedCode = this.getAttribute('data-code');
        airportInput.dataset.selectedName = this.getAttribute('data-name');
        airportInput.value = this.getAttribute('data-code') + ' \u2014 ' + this.getAttribute('data-name');
        suggestEl.style.display = 'none';
      });
    });
  });
};

window.debr8AddLandingCancel_ = function() {
  var overlay = document.getElementById('debr8-add-ldg-overlay');
  if (overlay) overlay.remove();
};

window.debr8AddLandingConfirm_ = function() {
  var timeRaw = String(((document.getElementById('debr8-ldg-time-in') || {}).value) || '').trim();
  var airportInput = document.getElementById('debr8-ldg-airport-in');
  var airportRaw = String((airportInput || {}).value || '').trim();
  var typeVal = String(((document.getElementById('debr8-ldg-type-in') || {}).value) || 'FULL').toUpperCase();

  if (!airportRaw) {
    if (window.M) M.toast({ html: 'Enter an airport or location', classes: 'orange' });
    return;
  }

  var timeFormatted = '';
  var digits = timeRaw.replace(/\D/g, '');
  if (digits.length === 3) digits = '0' + digits;
  if (digits.length >= 4) {
    var h = digits.substring(0, 2);
    var m = digits.substring(2, 4);
    h = String(Math.max(0, Math.min(23, Number(h)))).padStart(2, '0');
    m = String(Math.max(0, Math.min(59, Number(m)))).padStart(2, '0');
    timeFormatted = h + ':' + m;
  }

  var selectedCode = String((airportInput && airportInput.dataset && airportInput.dataset.selectedCode) || '').trim().toUpperCase();
  var selectedName = String((airportInput && airportInput.dataset && airportInput.dataset.selectedName) || '').trim();
  var icao = '';
  var name = '';
  var locDesc = '';

  if (selectedCode) {
    icao = selectedCode;
    name = selectedName;
  } else {
    locDesc = airportRaw;
    if (/^[A-Z]{4}$/i.test(airportRaw.trim())) {
      icao = airportRaw.trim().toUpperCase();
    }
  }

  var entry = {
    timeZ: timeFormatted,
    icao: icao,
    name: name,
    locDesc: locDesc || icao,
    type: typeVal
  };

  window.debrief8.landingLog = window.debrief8.landingLog || [];
  window.debrief8.landingLog.push(entry);
  window.debrief8.landingLogVerified = false;
  _debr8RenderLandingLog_();
  window.debr8AddLandingCancel_();
};

window.debr8VerifyLandingLog_ = function() {
  window.debrief8.landingLogVerified = true;
  _debr8RenderLandingLog_();
};

// ── End Landing Log ──────────────────────────────────────────────────────────

window.submitDebriefLog = function() {
  try {
    const isTimeLike = function(v) {
      const t = String(v || '').trim();
      if (!t) return false;
      return /^(\d{2}):(\d{2})$/.test(t);
    };
    const normalizeTime = function(v) {
      const t = String(v || '').trim();
      const m = t.match(/^(\d{2}):(\d{2})$/);
      if (!m) return t;
      const hh = String(Math.max(0, Math.min(23, Number(m[1] || 0)))).padStart(2, '0');
      const mm = String(Math.max(0, Math.min(59, Number(m[2] || 0)))).padStart(2, '0');
      return `${hh}:${mm}`;
    };

    const endTach = String(document.getElementById('debr8_endTach')?.value || '').trim();
    const fuelEndRaw = String(document.getElementById('debr8_fuelEnd')?.value || '').trim();
    const fuelEnd = fuelEndRaw === '' ? NaN : parseFloat(fuelEndRaw);
    const brakesReleaseRaw = document.getElementById('debr8_brakesReleaseInput')?.value || window.debrief8.traccarData.brakesRelease || '';
    const airborneRaw = document.getElementById('debr8_airborne')?.value || '';
    const landedRaw = document.getElementById('debr8_landed')?.value || window.debrief8.traccarData.landed || window.debrief8.traccarData.onBlocks || '';
    const brakesAppliedRaw = document.getElementById('debr8_onBlocks')?.value || window.debrief8.traccarData.onBlocks || '';
    const _landingLog = window.debrief8.landingLog || [];
    const numLdgs = Math.max(0, _landingLog.length);
    const numTouchAndGos = _landingLog.filter(function(e) { return String(e.type || '').toUpperCase() === 'TNG'; }).length;
    const nightLdgs = Math.max(0, parseInt(document.getElementById('debr8_nightLdgs')?.value, 10) || 0);
    const nightHrs = Math.max(0, parseFloat(document.getElementById('debr8_nightHrs')?.value) || 0);
    const ifrHrs = Math.max(0, parseFloat(document.getElementById('debr8_ifrHrs')?.value) || 0);
    const dualRecvd = Math.max(0, parseFloat(document.getElementById('debr8_dualRecvd')?.value) || 0);
    const dualGiven = Math.max(0, parseFloat(document.getElementById('debr8_dualGiven')?.value) || 0);
    const squawks = Array.from(document.querySelectorAll('#debr8-squawk-list .debr8-squawk-input'))
      .map(function(el) { return String(el && el.value || '').trim(); })
      .map(function(s) { return String(s || '').trim(); })
      .filter(Boolean)
      .join(', ');

    const brakesRelease = normalizeTime(brakesReleaseRaw);
    const airborne = normalizeTime(airborneRaw);
    const landed = normalizeTime(landedRaw);
    const brakesApplied = normalizeTime(brakesAppliedRaw);

    const fuelUsed = Math.max(0, (window.debrief8.fuelStart || 0) - (isNaN(fuelEnd) ? 0 : fuelEnd));

    if (!endTach) {
      if (window.M) M.toast({ html: 'Please enter End Tach reading', classes: 'orange' });
      return;
    }

    if (fuelEndRaw === '' || isNaN(fuelEnd)) {
      if (window.M) M.toast({ html: 'Please enter Fuel End reading', classes: 'orange' });
      return;
    }

    if (!isTimeLike(airborne) || !isTimeLike(landed)) {
      if (window.M) M.toast({ html: 'Airborne and Landed must be HH:MM (or 4 digits like 1134)', classes: 'orange' });
      return;
    }

    if (!_debr8AllChecksValid_()) {
      if (window.M) M.toast({ html: 'Verify all nine timeline boxes and the landing log before submitting', classes: 'orange' });
      return;
    }

    const totalTime = (function() {
      const parseSec = function(t) {
        const m = String(t || '').match(/^(\d{2}):(\d{2})$/);
        if (!m) return null;
        return Number(m[1]) * 3600 + Number(m[2]) * 60;
      };
      const a = parseSec(airborne);
      const l = parseSec(landed);
      if (a == null || l == null) return '';
      let d = l - a;
      if (d < 0) d += 24 * 3600;
      const hh = String(Math.floor(d / 3600)).padStart(2, '0');
      const mm = String(Math.floor((d % 3600) / 60)).padStart(2, '0');
      return `${hh}:${mm}`;
    })();

    const trainingCard = document.getElementById('debr8-training-card');
    let trainingDebrief = null;
    if (trainingCard) {
      const trainingCode = String(document.getElementById('debr8_trainingCode')?.value || '').trim();
      const flightResult = String(document.getElementById('debr8_trainingFlightResult')?.value || '').trim().toUpperCase();
      if (flightResult !== 'PASS' && flightResult !== 'FAIL') {
        if (window.M) M.toast({ html: 'Select training flight result (PASS or FAIL)', classes: 'orange' });
        return;
      }

      const runwayChecks = Array.from(document.querySelectorAll('.debr8-checkout-row')).map(function(row) {
        const icao = String(row.getAttribute('data-icao') || '').trim().toUpperCase();
        const okInput = row.querySelector('input[id^="debr8_checkout_ok_"]');
        const ldgInput = row.querySelector('input[id^="debr8_checkout_ldg_"]');
        const successful = !!(okInput && okInput.checked);
        const landings = Math.max(0, parseInt(ldgInput && ldgInput.value, 10) || 0);
        return { icao: icao, successful: successful, landings: landings };
      });

      const invalidCheckout = runwayChecks.some(function(rc) { return rc.successful && rc.landings <= 0; });
      if (invalidCheckout) {
        if (window.M) M.toast({ html: 'For successful runway checkouts, enter landings > 0', classes: 'orange' });
        return;
      }

      trainingDebrief = {
        isTrainingFlight: true,
        trainingCode: trainingCode,
        flightResult: flightResult,
        runwayChecks: runwayChecks
      };
    }

    const payload = {
      flightLegId: window.debrief8.flightLegId,
      missionId: String(window.debrief8 && window.debrief8.mission && window.debrief8.mission.id || ''),
      pilotName: String(window.debrief8 && window.debrief8.mission && window.debrief8.mission.pilot || ''),
      endTach: endTach,
      fuelEnd: fuelEnd,
      fuelUsed: fuelUsed,
      brakesRelease: brakesRelease,
      airborne: airborne,
      landed: landed,
      brakesApplied: brakesApplied,
      numLdgs: numLdgs,
      nightLdgs: nightLdgs,
      nightHrs: nightHrs,
      ifrHrs: ifrHrs,
      numTouchAndGos: numTouchAndGos,
      squawks: squawks,
      totalTime: totalTime,
      dualRecvd: dualRecvd,
      dualGiven: dualGiven,
      landingLog: _landingLog,
      trainingDebrief: trainingDebrief,
      debriefAt: new Date().toISOString()
    };

    const updateLocalAircraftTach_ = function(endTachValue) {
      const tachNum = parseFloat(endTachValue);
      if (!isFinite(tachNum)) return;
      const mission = (window.debrief8 && window.debrief8.mission && typeof window.debrief8.mission === 'object')
        ? window.debrief8.mission
        : null;
      const reg = String(mission && mission.acft || '').trim().toUpperCase();
      if (!reg) return;

      const patchAircraftList = function(list) {
        if (!Array.isArray(list)) return false;
        const acft = list.find(function(a) {
          return String(a && a.reg || '').trim().toUpperCase() === reg;
        });
        if (!acft) return false;
        acft.currentTach = tachNum;
        const nextDue = parseFloat(acft.nextDue);
        if (isFinite(nextDue)) {
          acft.hoursToInsp = parseFloat((nextDue - tachNum).toFixed(1));
        }
        return true;
      };

      try {
        if (window.appData && patchAircraftList(window.appData.aircraft)) {
          window.appData = window.appData;
        }
      } catch (e) {}

      try {
        if (typeof appData !== 'undefined' && appData && patchAircraftList(appData.aircraft)) {
          appData = appData;
        }
      } catch (eApp) {}

      try {
        if (typeof window.cacheGet === 'function' && typeof window.cacheSet === 'function' && window.OFFLINE_CACHE_KEYS && window.OFFLINE_CACHE_KEYS.DROPDOWN_DATA) {
          const cached = window.cacheGet(window.OFFLINE_CACHE_KEYS.DROPDOWN_DATA) || {};
          if (patchAircraftList(cached.aircraft)) {
            window.cacheSet(window.OFFLINE_CACHE_KEYS.DROPDOWN_DATA, cached);
          }
        }
      } catch (e2) {}
    };

    const onDebriefDone = function() {
      updateLocalAircraftTach_(payload.endTach);
      if (window.M) M.toast({ html: 'Mission debrief complete', classes: 'green' });
      switchTab(1);
      try {
        var refreshFn = (typeof window.checkMissionLegality === 'function')
          ? window.checkMissionLegality
          : (typeof checkMissionLegality === 'function' ? checkMissionLegality : null);
        if (window.activeMission && typeof refreshFn === 'function') {
          setTimeout(function() { refreshFn(window.activeMission); }, 220);
        }
      } catch (refreshErr) {}
    };

    if (typeof window.runOrQueueServerAction === 'function') {
      window.runOrQueueServerAction({
        method: 'recordDebriefLog',
        args: [payload],
        label: 'Debrief log'
      }, {
        onSuccess: function(resp) {
          console.log('Debrief saved successfully', resp);
          onDebriefDone();
        },
        onQueued: function() {
          if (window.M) M.toast({ html: 'Offline: debrief queued for sync', classes: 'orange' });
          onDebriefDone();
        },
        onFailure: function(err) {
          console.error('Debrief save failed', err);
          if (window.M) M.toast({ html: 'Save failed — check console for details', classes: 'red' });
        }
      });
    } else if (window.google && google.script && google.script.run) {
      const likelyNetworkErr = function(err) {
        const msg = err && err.message ? String(err.message) : String(err || '');
        return /HTTP 0|NetworkError|Connection failure|Failed to fetch|ScriptError/i.test(msg);
      };

      const submitDirect = function(retryAttempted) {
        google.script.run
          .withSuccessHandler(function(resp) {
            console.log('Debrief saved successfully', resp);
            onDebriefDone();
          })
          .withFailureHandler(function(err) {
            if (!retryAttempted && likelyNetworkErr(err)) {
              setTimeout(function() { submitDirect(true); }, 350);
              return;
            }

            if (likelyNetworkErr(err)) {
              console.warn('Debrief network failure; logging local payload fallback', err, payload);
              if (window.M) M.toast({ html: 'Offline: debrief save deferred (local fallback)', classes: 'orange' });
              onDebriefDone();
              return;
            }

            console.error('Debrief save failed', err);
            if (window.M) M.toast({ html: 'Save failed — check console for details', classes: 'red' });
          })
          .recordDebriefLog(payload);
      };

      submitDirect(false);
    } else {
      console.log('submitDebriefLog payload (no Apps Script):', payload);
      if (window.M) M.toast({ html: 'Local mode: debrief payload logged to console', classes: 'blue darken-2' });
    }
  } catch (err) {
    console.error('submitDebriefLog error', err);
    if (window.M) M.toast({ html: 'Unexpected error saving debrief', classes: 'red' });
  }
};

</script>
