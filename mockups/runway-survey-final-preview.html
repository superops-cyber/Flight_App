<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Runway Survey Tool — Final Preview</title>
  <style>
    :root {
      --bg: #02122b;
      --panel: #041d43;
      --panel-2: #010812;
      --title: #ffffff;
      --sky: #35bfff;
      --lime: #9dff31;
      --amber: #ffad2f;
      --magenta: #d447ff;
      --cyan-btn: #27d9ff;
      --orange: #ffac1f;
      --red-orange: #dc4a20;
      --green: #97ff2f;
      --text-dark: #151515;
      --text-light: #e8f1ff;
      --field-bg: #ffffff;
      --field-border: #dfe4ef;
      --radius: 14px;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: #1f2937;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Inter, "Helvetica Neue", Arial, sans-serif;
      padding: 16px;
      color: var(--text-light);
    }

    .tablet {
      width: min(760px, 96vw);
      border-radius: 28px;
      padding: 14px;
      background: linear-gradient(180deg, #2d3748, #111827);
      box-shadow: 0 20px 60px rgba(0,0,0,.45);
      border: 2px solid #4b5563;
    }

    .app {
      background: linear-gradient(180deg, #032c6e 0%, var(--bg) 35%, #001129 100%);
      border-radius: 18px;
      padding: 10px;
      border: 2px solid #0f335f;
    }

    .title {
      text-align: center;
      color: var(--title);
      font-weight: 900;
      letter-spacing: .03em;
      font-size: clamp(28px, 4.2vw, 38px);
      margin: 2px 0 8px;
      text-transform: uppercase;
    }

    .row-top {
      display: grid;
      grid-template-columns: 180px 130px 1fr;
      gap: 8px;
    }

    .field label {
      display: block;
      color: var(--sky);
      font-size: 13px;
      font-weight: 900;
      text-transform: uppercase;
      margin: 0 0 3px;
      letter-spacing: .04em;
    }

    .value {
      min-height: 56px;
      background: var(--field-bg);
      color: var(--text-dark);
      border-radius: 10px;
      border: 2px solid var(--field-border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 12px;
      font-size: 50px;
      font-weight: 900;
      line-height: 1;
    }
    .value.small { font-size: 54px; }
    .value.select { font-size: 37px; }

    .official {
      margin-top: 8px;
      border-radius: 10px;
      background: var(--panel-2);
      border: 2px solid #0f335f;
      padding: 4px 10px 6px;
    }

    .official .kicker {
      color: #92b3dc;
      font-size: 11px;
      text-transform: uppercase;
      font-weight: 900;
      letter-spacing: .04em;
    }

    .official .big {
      color: var(--lime);
      text-align: center;
      font-size: clamp(32px, 4.5vw, 52px);
      font-weight: 900;
      letter-spacing: .03em;
      margin-top: 1px;
      text-transform: uppercase;
    }

    .section-title {
      margin-top: 8px;
      color: var(--sky);
      font-size: 30px;
      font-weight: 900;
      letter-spacing: .03em;
      text-transform: uppercase;
    }

    .gps-actions {
      display: grid;
      grid-template-columns: 150px 1fr 150px;
      gap: 8px;
      margin-top: 3px;
    }

    .btn {
      min-height: 60px;
      border-radius: 12px;
      border: none;
      font-size: 30px;
      font-weight: 900;
      letter-spacing: .02em;
      text-transform: uppercase;
      display: grid;
      place-items: center;
      line-height: .95;
      color: var(--text-dark);
      box-shadow: inset 0 -2px 0 rgba(0,0,0,.2);
    }

    .btn.cyan { background: var(--cyan-btn); }
    .btn.orange { background: var(--orange); }

    .status-main {
      color: var(--sky);
      font-size: 50px;
      text-align: center;
      margin-top: 8px;
      font-weight: 900;
      text-transform: uppercase;
    }

    .status-gps {
      color: var(--amber);
      font-size: 32px;
      margin-top: 3px;
      font-weight: 900;
    }

    .step2 {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
      margin-top: 4px;
    }

    .instr {
      color: var(--magenta);
      font-size: 38px;
      font-weight: 900;
      line-height: 1.05;
      text-transform: uppercase;
    }

    .mrk-grid {
      display: grid;
      grid-template-columns: repeat(2, 120px);
      grid-template-rows: repeat(2, 44px);
      gap: 6px;
    }

    .mrk-grid .btn {
      min-height: 44px;
      font-size: 26px;
    }

    .toolbar {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
      margin-top: 8px;
    }

    .tool {
      min-height: 96px;
      border-radius: 12px;
      display: grid;
      place-items: center;
      color: var(--text-dark);
      font-weight: 900;
      text-transform: uppercase;
      font-size: 22px;
      text-align: center;
      line-height: 1;
      box-shadow: inset 0 -2px 0 rgba(0,0,0,.25);
    }

    .t1 { background: #20d9ff; }
    .t2 { background: #ffaf1d; }
    .t3 { background: #ff6a3d; }
    .t4 { background: #4dbf56; }
    .t5 { background: #2ba8b6; }

    .strip {
      margin-top: 8px;
      color: var(--amber);
      font-size: 47px;
      font-weight: 900;
      text-transform: uppercase;
      display: flex;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
    }

    .history {
      margin-top: 6px;
      color: #f2f4f8;
      font-size: 48px;
      font-weight: 800;
      line-height: 1.05;
    }

    .notes {
      margin-top: 7px;
      width: 100%;
      min-height: 180px;
      border-radius: 12px;
      border: 2px solid #526277;
      padding: 10px 12px;
      resize: vertical;
      font-size: 38px;
      font-weight: 700;
      background: #f4f6f8;
      color: #5c6672;
      font-family: inherit;
    }

    .bottom {
      margin-top: 9px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .bottom .btn {
      min-height: 70px;
      font-size: 50px;
      border-radius: 14px;
      color: #fff;
    }

    .cancel { background: var(--red-orange); }
    .submit { background: var(--green); color: #1f2a10 !important; }

    @media (max-width: 780px) {
      .title{font-size:42px}
      .value,.value.small{font-size:48px}
      .value.select{font-size:34px}
      .official .big{font-size:40px}
      .section-title{font-size:26px}
      .btn{font-size:26px}
      .status-main{font-size:40px}
      .status-gps{font-size:29px}
      .instr{font-size:34px}
      .strip{font-size:40px}
      .history{font-size:40px}
      .notes{font-size:33px}
      .bottom .btn{font-size:44px}
    }
  </style>
</head>
<body>
  <div class="tablet">
    <div class="app" role="img" aria-label="High-contrast preview of runway survey tool with large typography and tactile buttons">
      <div class="title">RNY SVY TL</div>

      <div class="row-top">
        <div class="field">
          <label>ARPT:</label>
          <div class="value">D39</div>
        </div>
        <div class="field">
          <label>RNY:</label>
          <div class="value small">15R <span style="font-size:.52em">▼</span></div>
        </div>
        <div class="field">
          <label>SURFACE OBSERVED *</label>
          <div class="value select">SELECT SURF... <span style="font-size:.52em">▼</span></div>
        </div>
      </div>

      <div class="official">
        <div class="kicker">OFFCL INFO (ROT)</div>
        <div class="big">LEN: 975M, WDT: 23M</div>
      </div>

      <div class="section-title">STEP 1: GPS SES</div>
      <div class="gps-actions">
        <button class="btn cyan" aria-label="Start GPS">🛰 START<br>GPS</button>
        <button class="btn orange" aria-label="Reset survey">↻ RESET SVY</button>
        <button class="btn cyan" aria-label="Start measuring">📏 START<br>MEAS</button>
      </div>

      <div class="status-main">MEAS TL IDLE</div>
      <div class="status-gps">GPS: Idle: 0 - current: 0m best: 0m avg: 0m</div>

      <div class="section-title">STEP 2: MRK PERIM</div>
      <div class="step2">
        <div class="instr">STAND STILL AT CORNER A<br>TAP APOMOTE B</div>
        <div class="mrk-grid">
          <button class="btn orange" aria-label="Mark corner A">MRK A</button>
          <button class="btn orange" aria-label="Mark corner B">MRK B</button>
          <button class="btn orange" aria-label="Mark corner C">MRK C</button>
          <button class="btn orange" aria-label="Mark corner D">MRK D</button>
        </div>
      </div>

      <div class="toolbar">
        <button class="tool t1" aria-label="Add feature">⚙<br>+FEAT</button>
        <button class="tool t2" aria-label="Add 50 meter obstacle">△<br>+50M</button>
        <button class="tool t3" aria-label="Add 300 meter obstacle">△<br>+300M</button>
        <button class="tool t4" aria-label="Add slope segment">⤴<br>+SLPE</button>
        <button class="tool t5" aria-label="Preview runway">✈<br>PREV</button>
      </div>

      <div class="strip"><span>FEATS: 0</span><span>OBS: 0</span><span>SLPE IDLE</span></div>
      <div class="history">Captured features yet.<br>No slope segments yet.</div>

      <textarea class="notes" placeholder="Pilot notes"></textarea>

      <div class="bottom">
        <button class="btn cancel" aria-label="Cancel survey">CANCEL</button>
        <button class="btn submit" aria-label="Submit survey">SUBMIT 🏵</button>
      </div>
    </div>
  </div>
</body>
</html>
